    Banking_LedgerScopeRequest:
      type: object
      description: Scope a query to a company, financial year, and bank ledger.
      required:
        - company_id
        - fy_id
        - ledger_id
      properties:
        company_id:
          type: integer
          description: Owning company id.
        fy_id:
          type: integer
          description: Financial year id.
        ledger_id:
          type: integer
          description: Bank ledger id whose entries are being reconciled.
    Banking_StatementRequest:
      type: object
      description: Date-bounded statement query for a bank ledger.
      required:
        - company_id
        - fy_id
        - ledger_id
        - from_date
        - to_date
      properties:
        company_id:
          type: integer
        fy_id:
          type: integer
        ledger_id:
          type: integer
        from_date:
          type: string
          format: date
          description: Inclusive start date (ISO-8601 date string).
        to_date:
          type: string
          format: date
          description: Inclusive end date (ISO-8601 date string).
    Banking_ReconcileRequest:
      type: object
      description: >
        Payload to create a reconciliation. Forwarded as-is by the controller;
        shape inferred from the writable columns of the reconciliations table.
      required:
        - entry_id
        - voucher_id
        - ledger_id
      properties:
        entry_id:
          type: integer
          description: Voucher entry being reconciled.
        voucher_id:
          type: integer
          description: Parent voucher of the entry.
        ledger_id:
          type: integer
          description: Bank ledger.
        reconciled_date:
          type: string
          format: date
          nullable: true
          description: Date the entry was reconciled (ISO-8601 date).
        bank_date:
          type: string
          format: date
          nullable: true
          description: Value date as shown on the bank statement.
        bank_reference:
          type: string
          nullable: true
          description: Bank-side reference / cheque / UTR number.
    Banking_UnreconcileRequest:
      type: object
      description: >
        Identifier of the reconciliation to delete. The controller expects a
        bare id scalar; this wrapper documents the value that must reach the
        handler.
      required:
        - reconciliation_id
      properties:
        reconciliation_id:
          type: integer
          description: Primary key of the reconciliations row to remove.
    Banking_Reconciliation:
      type: object
      description: A row of the reconciliations table.
      properties:
        reconciliation_id:
          type: integer
        entry_id:
          type: integer
        voucher_id:
          type: integer
        ledger_id:
          type: integer
        reconciled_date:
          type: string
          format: date
          nullable: true
        bank_date:
          type: string
          format: date
          nullable: true
        bank_reference:
          type: string
          nullable: true
        reconciled_at:
          type: string
          format: date-time
          description: ISO-8601 timestamp set by DEFAULT (datetime('now')).
    Banking_UnreconciledEntry:
      type: object
      description: >
        An unreconciled voucher entry for a bank ledger. Inferred join of
        voucher_entries and vouchers (not reconciled in the reconciliations
        table). Field set is a best-effort inference; confirm against the real
        service SQL.
      properties:
        entry_id:
          type: integer
        voucher_id:
          type: integer
        ledger_id:
          type: integer
        voucher_date:
          type: string
          format: date
          nullable: true
        debit:
          type: number
          nullable: true
          description: Debit amount (currency).
        credit:
          type: number
          nullable: true
          description: Credit amount (currency).
    Banking_StatementLine:
      type: object
      description: >
        A single line of a bank statement view. Inferred shape; confirm against
        the real service SQL once present.
      properties:
        entry_id:
          type: integer
        voucher_id:
          type: integer
        voucher_date:
          type: string
          format: date
          nullable: true
        debit:
          type: number
          nullable: true
        credit:
          type: number
          nullable: true
        balance:
          type: number
          nullable: true
          description: Running balance (currency).
        reconciled:
          type: boolean
          nullable: true
          description: Whether this line has a reconciliation record.
    Banking_MutationResult:
      type: object
      description: Generic result of a write/delete operation (shape inferred).
      properties:
        changes:
          type: integer
          description: Number of affected rows, if returned by the driver.
        success:
          type: boolean
    BankingSummary:
      type: object
      description: >
        Reconciliation/balance summary for a ledger. Inferred shape; confirm
        against the real service SQL.
      properties:
        ledger_id:
          type: integer
        reconciled_balance:
          type: number
          nullable: true
          description: Sum of reconciled entries (currency).
        unreconciled_balance:
          type: number
          nullable: true
          description: Sum of unreconciled entries (currency).
        book_balance:
          type: number
          nullable: true
          description: Total ledger balance per books (currency).
