        content:
          application/json:
            schema:
              type: object
              properties:
                id:
                  type: integer
                  description: trial_balance_reports.report_id to delete.
              required:
                - id
      responses:
        "200":
          description: >
            On success `{ success: true }`. If no report matches the id, returns
            `{ success: false, error: "Report not found" }`.
          content:
            application/json:
              schema:
                oneOf:
                  - type: object
                    properties:
                      success:
                        type: boolean
                        const: true
                    required:
                      - success
                  - $ref: "#/components/schemas/TrialBalanceReport_ServiceFailure"
        4XX:
          description: Client error.
          content:
            application/json:
              schema:
