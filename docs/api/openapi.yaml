                  - $ref: "#/components/schemas/GstRegistration_FailureResult"
        4XX:
          description: Client error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GstRegistration_Error"
        5XX:
          description: Server error.
          content:
            application/json:
              schema:
