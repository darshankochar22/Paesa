    post:
      operationId: trialBalanceReport.getAll
      tags:
        - trialBalanceReport
      summary: List all saved trial balance report headers for a company (newest first).
      x-ipc-channel: trialBalanceReport:getAll
      x-window-api: NOT EXPOSED in preload.js (no window.api binding for this channel)
      x-controller: trialBalanceReportController.getAll
      requestBody:
        required: true
        description: >
          Handler receives a bare scalar as its 2nd IPC arg (company_id), not an
          object.
        content:
          application/json:
            schema:
              type: object
              properties:
                company_id:
                  type: integer
                  description: companies.company_id to filter reports by.
              required:
                - company_id
      responses:
        "200":
          description: Array of report header rows.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    const: true
                  reports:
                    type: array
                    items:
                      $ref: "#/components/schemas/TrialBalanceReport"
                required:
                  - success
                  - reports
        4XX:
          description: Client error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrialBalanceReport_Error"
        5XX:
          description: Server/DB error (service returns ServiceFailure with 200 transport).
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/TrialBalanceReport_ServiceFailure"
                  - $ref: "#/components/schemas/TrialBalanceReport_Error"
