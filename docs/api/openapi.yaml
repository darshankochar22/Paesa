openapi: 3.1.0
info:
  title: Startup ERP — IPC Backend API
  version: 1.0.0
  description: >-
    Auto-generated contract for the Electron `ipcMain`/`preload` IPC backend.


    Transport is Electron IPC, **not** HTTP — paths model `namespace:action`
    channels so the surface renders in Swagger UI / Scalar and to future-proof a
    possible Hono REST migration. Each operation carries `x-ipc-channel` (the
    registered channel), `x-window-api` (the renderer binding) and
    `x-controller` extensions.


    The 3-point contract that must stay in sync: `preload.js` → `ipcMain.handle`
    in `server/index.js` → `window.api.<namespace>.<method>` at the call site.
