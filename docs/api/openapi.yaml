        updated_at.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required:
                - company_id
                - feature_item_id
              properties:
                company_id:
                  type: integer
                  description: companies.company_id (row selector).
                feature_item_id:
                  type: integer
                  description: feature_items.feature_item_id (row selector).
                value_boolean:
                  type: integer
                  enum:
                    - 0
                    - 1
                  description: 0/1 flag; stored as INTEGER in SQLite. Optional.
                value_text:
                  type:
                    - string
                    - "null"
                  description: Optional text value.
                value_number:
                  type:
                    - number
                    - "null"
                  description: Optional numeric value.
                value_date:
                  type:
                    - string
                    - "null"
                  description: Optional date value stored as TEXT.
                is_enabled:
                  type: integer
                  enum:
                    - 0
                    - 1
                  description: 0/1 enabled flag. Optional.
      responses:
        "200":
          description: Updated row, or failure envelope if not found.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/CompanyFeatureValues_FeatureValueResult"
                  - $ref: "#/components/schemas/CompanyFeatureValues_FailureResult"
