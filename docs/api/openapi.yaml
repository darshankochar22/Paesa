          description: 0/1 boolean flag (1 = active). Maps to BOOLEAN in Postgres.
        created_at:
          type: string
          description: ISO-8601 datetime string. Maps to TIMESTAMPTZ.
        updated_at:
          type: string
          description: ISO-8601 datetime string. Maps to TIMESTAMPTZ.
    WhatsappTemplate:
      type: object
      description: Row of whatsapp_templates (maps to table whatsapp_templates). Table
        exists in schema but is not read or written by any channel in this
        module.
      properties:
        template_id:
          type: integer
        company_id:
          type: integer
        name:
          type: string
        language:
          type: string
        category:
          type: string
        status:
          type: string
        created_at:
          type: string
          description: ISO-8601 datetime string. Maps to TIMESTAMPTZ.
    WhatsappLog:
      type: object
      description: Row of whatsapp_logs (maps to table whatsapp_logs).
      properties:
        log_id:
          type: integer
        company_id:
          type: integer
        voucher_id:
          type: integer
          nullable: true
        to_number:
          type: string
        message_type:
          type: string
          description: e.g. INVOICE, PAYMENT_REMINDER, STATEMENT, TEXT.
        template_name:
          type: string
          nullable: true
        status:
          type: string
          description: PENDING | SENT | FAILED.
        wamid:
          type: string
          nullable: true
        error:
          type: string
          nullable: true
          description: JSON-stringified Meta error on failure.
        sent_at:
          type: string
          description: ISO-8601 datetime string. Maps to TIMESTAMPTZ.
    Error:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
      required:
        - message
