          type: string
          default: ""
          description: company_gst_details.download_gst_registration (null in DB -> "" here)
        downloadReturnType:
          type: string
          default: All Returns
          description: company_gst_details.download_return_type
        setStateWiseThresholdLimit:
          type: boolean
          default: false
          description: company_gst_details.set_state_wise_threshold_limit (0/1 INTEGER ->
            boolean)
        stateWiseLimits:
          type: array
          items: {}
