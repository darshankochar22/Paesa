                  voucher_number:
                    type: string
                    description: Full formatted voucher number, e.g. "SAL-00012".
                required:
                  - success
                  - nextNumber
                  - voucher_number
        4XX:
          $ref: "#/components/responses/Error"
        5XX:
          $ref: "#/components/responses/Error"
  /voucher/getLedgerBalance:
    post:
      tags:
        - voucher
      operationId: voucher.getLedgerBalance
      summary: Compute a ledger's running balance (opening + posted Dr/Cr from
        non-cancelled vouchers in the fy), returning a Dr/Cr formatted label and
        the signed raw balance.
      x-ipc-channel: voucher:getLedgerBalance
      x-window-api: window.api.voucher.getLedgerBalance
      x-controller: voucherController.getLedgerBalance
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ledger_id:
                  type: integer
                company_id:
                  type: integer
                fy_id:
                  type: integer
              required:
                - ledger_id
                - company_id
                - fy_id
      responses:
        "200":
          description: Ledger balance result or not-found.
          content:
            application/json:
              schema:
                oneOf:
                  - type: object
                    properties:
                      success:
                        const: true
                      balance:
                        type: string
                        description: Formatted label, e.g. "1500.00 Dr", "200.00 Cr" or "0.00".
                      rawBalance:
                        type: number
                        description: Signed numeric balance (positive = Dr nature surplus).
                    required:
                      - success
                      - balance
                      - rawBalance
                  - $ref: "#/components/schemas/Voucher_ServiceError"
        4XX:
          $ref: "#/components/responses/Error"
        5XX:
          $ref: "#/components/responses/Error"
  /voucher/searchLedgers:
    post:
      tags:
        - voucher
      operationId: voucher.searchLedgers
      summary: Search active ledgers of a company by name or alias (case-insensitive
        LIKE), max 50 rows, ordered by name.
      x-ipc-channel: voucher:searchLedgers
      x-window-api: window.api.voucher.searchLedgers
      x-controller: voucherController.searchLedgers
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                company_id:
                  type: integer
                searchTerm:
                  type:
                    - string
                    - "null"
                  description: Substring to match against ledger name/alias. Empty matches all.
              required:
                - company_id
      responses:
        "200":
          description: Matching ledger rows. Ledger shape belongs to the ledger module.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    const: true
                  ledgers:
                    type: array
                    items:
                      type: object
                      additionalProperties: true
                      description: Full ledger row (SELECT *). Schema owned by the ledger module.
                required:
                  - success
                  - ledgers
        4XX:
          $ref: "#/components/responses/Error"
        5XX:
          $ref: "#/components/responses/Error"
  /voucher/getPendingBills:
    post:
      tags:
        - voucher
      operationId: voucher.getPendingBills
      summary: List pending bill references ('New Ref'/'Advance') for a ledger with
        positive aggregated balance, plus the ledger's default credit terms.
      x-ipc-channel: voucher:getPendingBills
      x-window-api: window.api.voucher.getPendingBills
      x-controller: voucherController.getPendingBills
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ledger_id:
                  type: integer
                company_id:
                  type: integer
                fy_id:
                  type: integer
              required:
                - ledger_id
                - company_id
                - fy_id
      responses:
        "200":
          description: Pending bills with credit-period metadata.
          content:
            application/json:
              schema:
                oneOf:
                  - type: object
                    properties:
                      success:
                        const: true
                      pendingBills:
                        type: array
                        items:
                          type: object
                          properties:
                            bill_name:
                              type:
                                - string
                                - "null"
                            bill_date:
                              type:
                                - string
                                - "null"
                              format: date
                            due_date:
                              type:
                                - string
                                - "null"
                              format: date
                            credit_period:
                              type:
                                - string
                                - "null"
                            balance:
                              type: number
                              description: Aggregated outstanding amount (currency).
                            final_balance:
                              type: number
                      defaultCreditPeriod:
                        description: Ledger default credit period (numeric days or 0).
                      checkCreditDays:
                        description: Ledger flag/value for credit-day checking (0/1 or numeric).
                    required:
                      - success
                      - pendingBills
                  - $ref: "#/components/schemas/Voucher_ServiceError"
        4XX:
          $ref: "#/components/responses/Error"
        5XX:
          $ref: "#/components/responses/Error"
