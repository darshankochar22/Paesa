        object. The service SELECTs the single row keyed by company_id and maps
        the stored snake_case columns into a camelCase data object. The two
        INTEGER 0/1 flag columns (set_alter_person_responsible,
        ignore_it_exemption) are converted to booleans via `=== 1`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                company_id:
                  type: integer
                  description: >
                    The company primary key. NOTE: the handler is invoked as
                    invoke('companyTcsDetails:get', company_id) with a bare
                    scalar, so the transport payload is this id value, modelled
                    here as a single property.
              required:
                - company_id
      responses:
        "200":
          description: Lookup result envelope.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/CompanyTcsDetailsGetFound"
                  - $ref: "#/components/schemas/CompanyTcsDetailsGetNotFound"
                  - $ref: "#/components/schemas/CompanyTcsDetails_ServiceError"
        4XX:
          description: Client error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompanyTcsDetails_Error"
        5XX:
          description: Server/IPC error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompanyTcsDetails_Error"
  /companyTcsDetails/save:
