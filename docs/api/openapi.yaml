      operationId: companyFeatureValues.updateBulk
      tags:
        - companyFeatureValues
      summary: Update many feature values for a company in one call (skips rows that
        do not exist).
      x-ipc-channel: companyFeatureValues:updateBulk
      x-window-api: window.api.companyFeatureValues.updateBulk
      x-controller: companyFeatureValuesController.updateBulk
      description: >
        Controller destructures { company_id, values } from arg 2 and calls
        service.updateBulk(company_id, values). Iterates values; for each
        existing (company_id, feature_item_id) row, applies the same per-column
        ?? fallback as update. Missing rows are skipped (no error). Returns the
        array of updated rows.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required:
                - company_id
                - values
              properties:
                company_id:
                  type: integer
                  description: companies.company_id for all entries.
                values:
                  type: array
                  description: Per-feature update payloads.
                  items:
                    type: object
                    additionalProperties: false
                    required:
                      - feature_item_id
                    properties:
                      feature_item_id:
                        type: integer
                        description: feature_items.feature_item_id (row selector).
                      value_boolean:
                        type: integer
                        enum:
                          - 0
                          - 1
                      value_text:
                        type:
                          - string
                          - "null"
                      value_number:
                        type:
                          - number
                          - "null"
                      value_date:
                        type:
                          - string
                          - "null"
                      is_enabled:
                        type: integer
                        enum:
                          - 0
                          - 1
      responses:
        "200":
          description: Array of updated rows (only rows that existed).
          content:
            application/json:
              schema:
                oneOf:
