        endpoint.
      x-ipc-channel: eInvoice:getGSTINDetails
      x-window-api: window.api.eInvoice.getGSTINDetails
      x-controller: eInvoiceController.getGSTINDetails
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required:
                - gstin
                - company_id
              properties:
                gstin:
                  type: string
                  description: GSTIN to look up on the IRP master endpoint.
                company_id:
                  type: integer
                  description: Company whose stored IRP credentials are used.
      responses:
        "200":
          description: GSTIN details result.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/EInvoice_IrpDataSuccess"
                  - $ref: "#/components/schemas/EInvoice_ServiceError"
        4XX:
          $ref: "#/components/responses/Error"
        5XX:
          $ref: "#/components/responses/Error"
  /eInvoice/generateIRN:
    post:
      operationId: eInvoice.generateIRN
      tags:
        - eInvoice
      summary: Generate an IRN for an invoice payload and persist the record.
      description: >
        Ensures auth, POSTs `invoice_payload` to the IRP Invoice endpoint and,
        on success, inserts a row into `einvoice_records` (status `GENERATED`)
        capturing IRN, AckNo/AckDt, signed invoice/QR, EWB details and the raw
        IRP response. Invoice number/date and buyer GSTIN are read from the
        payload's `DocDtls` and `BuyerDtls`.
      x-ipc-channel: eInvoice:generateIRN
      x-window-api: window.api.eInvoice.generateIRN
      x-controller: eInvoiceController.generateIRN
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required:
                - company_id
                - invoice_payload
              properties:
                company_id:
                  type: integer
                  description: Company that owns the generated record and credentials.
                voucher_id:
                  type:
                    - integer
                    - "null"
                  description: Optional source voucher id linking the record to a voucher.
                invoice_payload:
                  $ref: "#/components/schemas/EInvoice_IrpInvoicePayload"
      responses:
        "200":
          description: IRN generation result. On success the persisted IRP Data block is
            returned.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/EInvoice_IrpDataSuccess"
                  - $ref: "#/components/schemas/EInvoice_ServiceError"
        4XX:
          $ref: "#/components/responses/Error"
        5XX:
          $ref: "#/components/responses/Error"
  /eInvoice/getIRNDetails:
    post:
      operationId: eInvoice.getIRNDetails
      tags:
        - eInvoice
      summary: Fetch details of an existing IRN from the IRP.
      x-ipc-channel: eInvoice:getIRNDetails
      x-window-api: window.api.eInvoice.getIRNDetails
      x-controller: eInvoiceController.getIRNDetails
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required:
                - irn
                - company_id
              properties:
                irn:
                  type: string
                  description: Invoice Reference Number to look up.
                company_id:
                  type: integer
                  description: Company whose stored IRP credentials are used.
      responses:
        "200":
          description: IRN details result.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/EInvoice_IrpDataSuccess"
                  - $ref: "#/components/schemas/EInvoice_ServiceError"
        4XX:
          $ref: "#/components/responses/Error"
        5XX:
          $ref: "#/components/responses/Error"
  /eInvoice/cancelIRN:
    post:
      operationId: eInvoice.cancelIRN
      tags:
        - eInvoice
      summary: Cancel an IRN and mark the local record cancelled.
      description: >
        Ensures auth and POSTs a cancel request to the IRP. On success updates
        the matching `einvoice_records` row (by `irn`) to status `CANCELLED`,
        storing the cancel reason/remarks and `cancelled_at`.
      x-ipc-channel: eInvoice:cancelIRN
      x-window-api: window.api.eInvoice.cancelIRN
      x-controller: eInvoiceController.cancelIRN
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required:
                - irn
                - cancel_reason
                - cancel_remarks
                - company_id
              properties:
                irn:
                  type: string
                  description: IRN to cancel.
                cancel_reason:
                  type:
                    - integer
                    - string
                  description: >
                    IRP cancellation reason code (CnlRsn). Stored in
                    `einvoice_records.cancel_reason`.
                cancel_remarks:
                  type: string
                  description: Free-text cancellation remarks (CnlRem).
                company_id:
                  type: integer
                  description: Company whose stored IRP credentials are used.
      responses:
        "200":
          description: Cancellation result.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/EInvoice_IrpDataSuccess"
                  - $ref: "#/components/schemas/EInvoice_ServiceError"
        4XX:
          $ref: "#/components/responses/Error"
        5XX:
          $ref: "#/components/responses/Error"
