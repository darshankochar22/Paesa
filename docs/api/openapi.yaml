      tags:
        - trialBalanceReport
      summary: Fetch one report header plus its detail rows (ordered by display_order).
      x-ipc-channel: trialBalanceReport:getById
      x-window-api: NOT EXPOSED in preload.js (no window.api binding for this channel)
      x-controller: trialBalanceReportController.getById
      requestBody:
        required: true
        description: Handler receives a bare scalar as its 2nd IPC arg (report id).
        content:
          application/json:
            schema:
              type: object
              properties:
                id:
                  type: integer
                  description: trial_balance_reports.report_id to fetch.
              required:
                - id
      responses:
        "200":
          description: >
            On success, report header with an embedded `rows` array. If no
            report matches the id, returns `{ success: false, error: "Report not
            found" }`.
          content:
            application/json:
              schema:
                oneOf:
                  - type: object
                    properties:
                      success:
                        type: boolean
                        const: true
                      report:
                        allOf:
                          - $ref: "#/components/schemas/TrialBalanceReport"
                          - type: object
                            properties:
                              rows:
                                type: array
                                items:
                                  $ref: "#/components/schemas/TrialBalanceReport_TrialBalanceRow"
                            required:
                              - rows
                    required:
                      - success
                      - report
                  - $ref: "#/components/schemas/TrialBalanceReport_ServiceFailure"
        4XX:
          description: Client error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrialBalanceReport_Error"
        5XX:
          description: Server/DB error (service returns ServiceFailure with 200 transport).
          content:
            application/json:
              schema:
                oneOf:
