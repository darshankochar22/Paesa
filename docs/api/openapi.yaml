          description: Unit name. Required (uniqueness checked case-insensitively per
            company among active units).
        symbol:
          type:
            - string
            - "null"
          description: Short symbol.
        formal_name:
          type:
            - string
            - "null"
          description: Formal name. Defaults to null when omitted.
        unit_type:
          type: string
          description: Defaults to "Simple" when omitted.
          default: Simple
        decimal_places:
          type: integer
          description: Defaults to 0 when omitted (uses `?? 0`).
          default: 0
        first_unit:
          type:
            - string
            - "null"
          description: First unit. Defaults to null when omitted.
        conversion:
          type:
            - number
            - "null"
          description: Conversion factor. Defaults to null when omitted/falsy.
        second_unit:
          type:
            - string
            - "null"
          description: Second unit. Defaults to null when omitted.
      required:
        - company_id
        - name
