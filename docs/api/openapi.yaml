          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VoucherEntryActions_VoucherEntryActionListResult"
        4XX:
          $ref: "#/components/responses/Error"
        5XX:
          $ref: "#/components/responses/Error"
  /voucherEntryActions/delete:
    post:
      operationId: voucherEntryActions.delete
      tags:
        - voucherEntryActions
      summary: Delete one voucher entry action by its action_id.
      description: Controller passes arg 2 straight through as `id` (a bare scalar
