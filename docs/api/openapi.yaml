        taxabilityType:
          type: string
          default: Not Defined
          description: company_gst_details.taxability_type
        gstRate:
          type: number
          default: 0
          description: company_gst_details.gst_rate (REAL -> NUMERIC(18,4))
        interstateThresholdLimit:
          type: number
          default: 50000
          description: company_gst_details.interstate_threshold_limit (money ->
            NUMERIC(18,2))
        intrastateThresholdLimit:
          type: number
          default: 50000
          description: company_gst_details.intrastate_threshold_limit (money ->
            NUMERIC(18,2))
