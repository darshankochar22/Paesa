          description: Bad request.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompanyFeatureValues_Error"
        5XX:
          description: Server/IPC error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompanyFeatureValues_Error"
