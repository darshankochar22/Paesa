          description: company_gst_details.show_gst_advances (0/1 INTEGER -> boolean)
        updateGSTStatus:
          type: boolean
          default: false
          description: company_gst_details.update_gst_status (0/1 INTEGER -> boolean)
        gstReturnsConfigured:
          type: boolean
          default: false
          description: company_gst_details.gst_returns_configured (0/1 INTEGER -> boolean)
        effectiveDate:
          type: string
          default: 1-Apr-26
          description: >
