  /voucher/getNextNumber:
    post:
      tags:
        - voucher
      operationId: voucher.getNextNumber
      summary: Compute the next auto voucher number for a company/fy/type (e.g.
        SAL-00012), based on the max existing numeric suffix + 1.
      x-ipc-channel: voucher:getNextNumber
      x-window-api: window.api.voucher.getNextNumber
      x-controller: voucherController.getNextNumber
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                company_id:
                  type: integer
                fy_id:
                  type: integer
                voucher_type:
                  type: string
                  description: Renderer binding param is `type`, sent as `voucher_type`.
              required:
                - company_id
                - fy_id
                - voucher_type
      responses:
        "200":
          description: Next number info.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    const: true
                  nextNumber:
