  /stockItem/getStockBalances:
    post:
      tags:
        - stockItem
      summary: Compute current stock balances per item for a company.
      description: >
        Computes a per-item quantity balance for all active stock items in a
        company. Starts from `opening_quantity`, then applies signed movement
        from `voucher_stock_entries` joined to non-cancelled `vouchers`
        (Purchase / Receipt Note / Rejection In / Material In / Credit Note add;
        Sales / Delivery Note / Rejection Out / Material Out / Debit Note
        subtract; Stock/Manufacturing Journal use `is_source` to sign). If
        physical stock entries exist, the latest physical count per item
        overrides the computed balance and only voucher movements dated after
        the physical-stock date are re-applied on top. Returns a map of `item_id
        -> balance`.
      operationId: stockItem.getStockBalances
      x-ipc-channel: stockItem:getStockBalances
      x-window-api: window.api.stockItem.getStockBalances
      x-controller: stockItemController.getStockBalances
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                company_id:
                  type: integer
                  description: Company id (bare scalar passed as arg 2 of the channel).
              required:
                - company_id
      responses:
        "200":
          description: Balances result.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/StockItem_StockBalancesSuccess"
                  - $ref: "#/components/schemas/StockItem_ServiceError"
        4XX:
          description: Client error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StockItem_Error"
        5XX:
          description: Server error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StockItem_Error"
