  /dayBookReport/create:
    post:
      tags:
        - dayBookReport
      summary: Create a Day Book report along with its nested entries and entry lines.
      operationId: dayBookReport.create
      x-ipc-channel: dayBookReport:create
      x-window-api: window.api.dayBookReport.create  (NOT exposed in preload.js)
      x-controller: dayBookReportController.create
      description: >
        Inserts one row into day_book_reports. If `entries[]` is supplied,
        inserts a day_book_entries row per entry, and for each entry's `lines[]`
        inserts a day_book_entry_lines row. Returns the freshly inserted report
        header row.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DayBookReportCreateInput"
      responses:
        "200":
          description: Report created. Returns success flag and the inserted header row.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    const: true
                  report:
                    $ref: "#/components/schemas/DayBookReport"
                required:
                  - success
                  - report
        4XX:
          $ref: "#/components/responses/Error"
        5XX:
          $ref: "#/components/responses/Error"
      x-error-shape: >
        On caught exceptions the service returns { success: false, error:
        <message> } (HTTP 200 in IPC terms). The Error component models the
        conventional API error shape.
  /dayBookReport/getAll:
    post:
      tags:
        - dayBookReport
      summary: List all Day Book reports for a company, newest first.
      operationId: dayBookReport.getAll
      x-ipc-channel: dayBookReport:getAll
      x-window-api: window.api.dayBookReport.getAll  (NOT exposed in preload.js)
      x-controller: dayBookReportController.getAll
      description: >
        The controller passes IPC arg 2 (a bare company_id scalar) straight to
        the service. SELECT * FROM day_book_reports WHERE company_id = ? ORDER
        BY created_at DESC.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                company_id:
                  type: integer
                  description: >
                    The company whose reports to list. NOTE: the controller
                    receives this as a bare scalar (event, company_id), not an
                    object.
              required:
                - company_id
      responses:
        "200":
          description: Array of report header rows.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    const: true
                  reports:
                    type: array
                    items:
                      $ref: "#/components/schemas/DayBookReport"
                required:
                  - success
                  - reports
        4XX:
          $ref: "#/components/responses/Error"
        5XX:
          $ref: "#/components/responses/Error"
  /dayBookReport/getById:
    post:
      tags:
        - dayBookReport
      summary: Fetch one Day Book report with its entries, lines, and computed totals.
      operationId: dayBookReport.getById
      x-ipc-channel: dayBookReport:getById
      x-window-api: window.api.dayBookReport.getById  (NOT exposed in preload.js)
      x-controller: dayBookReportController.getById
      description: >
        Loads the report header, its day_book_entries (ordered by display_order
        ASC), and each entry's day_book_entry_lines (ordered by line_order ASC).
        Computes totalDebit / totalCredit by summing entry debit_amount /
        credit_amount. Returns { success: false, error: 'Report not found' }
        when the id does not exist.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                id:
                  type: integer
                  description: >
                    report_id. Received by the controller as a bare scalar
                    (event, id).
              required:
                - id
      responses:
        "200":
          description: Report header enriched with entries, lines, and totals.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  error:
                    type: string
                    description: Present (with success=false) when the report is not found.
                  report:
                    allOf:
                      - $ref: "#/components/schemas/DayBookReport"
                      - type: object
                        properties:
                          entries:
                            type: array
                            items:
                              $ref: "#/components/schemas/DayBookReport_DayBookEntryWithLines"
                          totalDebit:
                            type: number
                            description: Sum of entry debit_amount values (currency).
                          totalCredit:
                            type: number
                            description: Sum of entry credit_amount values (currency).
                required:
                  - success
        4XX:
          $ref: "#/components/responses/Error"
        5XX:
          $ref: "#/components/responses/Error"
  /dayBookReport/delete:
    post:
      tags:
        - dayBookReport
      summary: Delete a Day Book report (cascades to its entries and lines).
      operationId: dayBookReport.delete
      x-ipc-channel: dayBookReport:delete
      x-window-api: window.api.dayBookReport.delete  (NOT exposed in preload.js)
      x-controller: dayBookReportController.delete
      description: >
        Verifies the report exists, then DELETE FROM day_book_reports WHERE
        report_id = ?. Child rows in day_book_entries and day_book_entry_lines
        are removed by ON DELETE CASCADE. Returns { success: false, error:
        'Report not found' } when the id is unknown.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                id:
                  type: integer
                  description: report_id. Received as a bare scalar (event, id).
              required:
                - id
      responses:
        "200":
          description: Deletion result.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  error:
                    type: string
                    description: Present (with success=false) when the report is not found.
                required:
                  - success
        4XX:
          $ref: "#/components/responses/Error"
        5XX:
          $ref: "#/components/responses/Error"
