      responses:
        "200":
          description: Result envelope with the voucher type + config columns.
          content:
            application/json:
              schema:
                oneOf:
                  - type: object
                    properties:
                      success:
                        const: true
                      voucherType:
                        $ref: "#/components/schemas/VoucherTypeWithFullConfig"
                    required:
                      - success
                      - voucherType
                  - $ref: "#/components/schemas/VoucherType_FailureEnvelope"
        4XX:
          description: Validation/transport error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VoucherType_Error"
        5XX:
          description: Unexpected error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VoucherType_Error"
  /voucherType/update:
    post:
      tags:
        - voucherType
      summary: Update an existing user-defined voucher type.
      operationId: voucherType.update
      x-ipc-channel: voucherType:update
      x-window-api: window.api.voucherType.update
      x-controller: voucherTypeController.update
      description: "Rejects (success:false) when the target row does not exist, or
        when it is predefined ('Cannot edit predefined voucher types').
        Unsupplied fields fall back to the existing stored value via the ??
        operator (note: affects_inventory/affects_accounting/affects_gst are
        always coerced to 0/1 from the truthiness of the supplied value, so
        omitting them sets 0)."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VoucherTypeUpdateInput"
      responses:
        "200":
          description: Result envelope with the updated voucher_types row.
          content:
            application/json:
              schema:
                oneOf:
                  - type: object
                    properties:
                      success:
                        const: true
                      voucherType:
                        $ref: "#/components/schemas/VoucherType"
                    required:
                      - success
                      - voucherType
                  - $ref: "#/components/schemas/VoucherType_FailureEnvelope"
        4XX:
          description: Validation/transport error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VoucherType_Error"
        5XX:
          description: Unexpected error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VoucherType_Error"
  /voucherType/delete:
    post:
      tags:
        - voucherType
      summary: Soft-delete a user-defined voucher type (sets is_active = 0).
      operationId: voucherType.delete
      x-ipc-channel: voucherType:delete
      x-window-api: window.api.voucherType.delete
      x-controller: voucherTypeController.delete
      description: Handler receives a bare vt_id scalar. Performs a soft delete
        (is_active=0, updated_at=now). Rejects (success:false) when the row is
        missing or is predefined ('Cannot delete predefined voucher types').
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: integer
              description: The vt_id of the voucher type to soft-delete (bare scalar).
      responses:
        "200":
          description: Result envelope (boolean success only).
          content:
            application/json:
              schema:
                oneOf:
                  - type: object
                    properties:
                      success:
                        const: true
                    required:
                      - success
                  - $ref: "#/components/schemas/VoucherType_FailureEnvelope"
        4XX:
          description: Validation/transport error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VoucherType_Error"
        5XX:
          description: Unexpected error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VoucherType_Error"
  /voucherType/getConfig:
    post:
      tags:
        - voucherType
      summary: Fetch the voucher_type_configs row for a voucher type.
      operationId: voucherType.getConfig
      x-ipc-channel: voucherType:getConfig
      x-window-api: window.api.voucherType.getConfig
      x-controller: voucherTypeController.getConfig
      description: Handler receives a bare voucher_type_id scalar. Returns
        success:false with error 'Config not found' when no config row matches.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: integer
              description: The voucher_type_id (= voucher_types.vt_id) whose config to fetch
                (bare scalar passed as arg 2).
      responses:
        "200":
          description: Result envelope with the voucher_type_configs row.
          content:
            application/json:
              schema:
                oneOf:
                  - type: object
                    properties:
                      success:
                        const: true
                      config:
                        $ref: "#/components/schemas/VoucherTypeConfig"
                    required:
                      - success
                      - config
                  - $ref: "#/components/schemas/VoucherType_FailureEnvelope"
        4XX:
          description: Validation/transport error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VoucherType_Error"
        5XX:
          description: Unexpected error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VoucherType_Error"
  /voucherType/updateConfig:
    post:
      tags:
        - voucherType
      summary: Update the voucher_type_configs row for a voucher type.
      operationId: voucherType.updateConfig
      x-ipc-channel: voucherType:updateConfig
      x-window-api: window.api.voucherType.updateConfig
      x-controller: voucherTypeController.updateConfig
      description: Rejects (success:false) when no config row exists for the
        voucher_type_id ('Config not found'). Unsupplied fields fall back to the
        existing stored value via the ?? operator.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VoucherTypeConfigUpdateInput"
      responses:
        "200":
          description: Result envelope with the updated voucher_type_configs row.
          content:
            application/json:
              schema:
                oneOf:
                  - type: object
                    properties:
                      success:
                        const: true
                      config:
                        $ref: "#/components/schemas/VoucherTypeConfig"
                    required:
                      - success
                      - config
                  - $ref: "#/components/schemas/VoucherType_FailureEnvelope"
        4XX:
          description: Validation/transport error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VoucherType_Error"
        5XX:
          description: Unexpected error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VoucherType_Error"
  /whatsapp/saveConfig:
    post:
      tags:
        - whatsapp
      summary: Create or update the WhatsApp Cloud API config for a company (upsert by
        company_id).
      operationId: whatsapp.saveConfig
      x-ipc-channel: whatsapp:saveConfig
      x-window-api: window.api.whatsapp.saveConfig
      x-controller: whatsappController.saveConfig
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WhatsappConfigInput"
      responses:
        "200":
          description: Upsert result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Whatsapp_SuccessResult"
        4XX:
          $ref: "#/components/responses/ErrorResponse"
        5XX:
          $ref: "#/components/responses/ErrorResponse"
  /whatsapp/getConfig:
    post:
      tags:
        - whatsapp
      summary: Get the active WhatsApp config for a company.
      operationId: whatsapp.getConfig
      x-ipc-channel: whatsapp:getConfig
      x-window-api: window.api.whatsapp.getConfig
      x-controller: whatsappController.getConfig
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - company_id
              properties:
                company_id:
                  type: integer
                  description: Company whose active config to fetch.
      responses:
        "200":
          description: Config lookup result. `success:false` when not configured.
          content:
            application/json:
              schema:
                oneOf:
                  - type: object
                    required:
                      - success
                      - config
                    properties:
                      success:
                        type: boolean
                        const: true
                      config:
                        $ref: "#/components/schemas/WhatsappConfig"
                  - $ref: "#/components/schemas/Whatsapp_FailureResult"
        4XX:
          $ref: "#/components/responses/ErrorResponse"
        5XX:
          $ref: "#/components/responses/ErrorResponse"
  /whatsapp/sendInvoice:
    post:
      tags:
        - whatsapp
      summary: Send an invoice via the 'invoice_share' WhatsApp template; logs the
        attempt.
      operationId: whatsapp.sendInvoice
      x-ipc-channel: whatsapp:sendInvoice
      x-window-api: window.api.whatsapp.sendInvoice
      x-controller: whatsappController.sendInvoice
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - company_id
                - voucher_id
                - to_phone
                - invoice_data
              properties:
                company_id:
                  type: integer
                voucher_id:
                  type: integer
                  description: Voucher this invoice belongs to (stored on the log row).
                to_phone:
                  type: string
                  description: Recipient phone; normalized to E.164-ish (India default +91).
                invoice_data:
                  type: object
                  description: Template body parameters.
                  properties:
                    party_name:
                      type: string
                      description: Defaults to "Customer" if absent.
                    voucher_number:
                      type: string
                    date:
                      type: string
                    total_amount:
                      type:
                        - string
                        - number
                      description: Rendered as "₹<total_amount>" in the template.
      responses:
        "200":
          description: Send result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Whatsapp_SendResult"
        4XX:
          $ref: "#/components/responses/ErrorResponse"
        5XX:
          $ref: "#/components/responses/ErrorResponse"
  /whatsapp/sendPaymentReminder:
    post:
      tags:
        - whatsapp
      summary: Send a payment reminder via the 'payment_reminder' WhatsApp template;
        logs the attempt.
      operationId: whatsapp.sendPaymentReminder
      x-ipc-channel: whatsapp:sendPaymentReminder
      x-window-api: window.api.whatsapp.sendPaymentReminder
      x-controller: whatsappController.sendPaymentReminder
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - company_id
                - to_phone
                - reminder_data
              properties:
                company_id:
                  type: integer
                to_phone:
                  type: string
                reminder_data:
                  type: object
                  properties:
                    party_name:
                      type: string
                    outstanding_amount:
                      type:
                        - string
                        - number
                      description: Rendered as "₹<outstanding_amount>".
                    due_date:
                      type: string
                      description: Defaults to "immediately" if absent.
      responses:
        "200":
          description: Send result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Whatsapp_SendResult"
        4XX:
          $ref: "#/components/responses/ErrorResponse"
        5XX:
          $ref: "#/components/responses/ErrorResponse"
  /whatsapp/sendStatement:
    post:
      tags:
        - whatsapp
      summary: Send an account statement via the 'account_statement' WhatsApp
        template; logs the attempt.
      operationId: whatsapp.sendStatement
      x-ipc-channel: whatsapp:sendStatement
      x-window-api: window.api.whatsapp.sendStatement
      x-controller: whatsappController.sendStatement
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - company_id
                - to_phone
                - statement_data
              properties:
                company_id:
                  type: integer
                to_phone:
                  type: string
                statement_data:
                  type: object
                  properties:
                    party_name:
                      type: string
                    from_date:
                      type: string
                    to_date:
                      type: string
                    closing_balance:
                      type:
                        - string
                        - number
                      description: Rendered as "₹<closing_balance>".
      responses:
        "200":
          description: Send result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Whatsapp_SendResult"
        4XX:
          $ref: "#/components/responses/ErrorResponse"
        5XX:
          $ref: "#/components/responses/ErrorResponse"
  /whatsapp/sendText:
    post:
      tags:
        - whatsapp
      summary: Send a free-form text WhatsApp message; logs the attempt.
      operationId: whatsapp.sendText
      x-ipc-channel: whatsapp:sendText
      x-window-api: window.api.whatsapp.sendText
      x-controller: whatsappController.sendText
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - company_id
                - to_phone
                - message
              properties:
                company_id:
                  type: integer
                to_phone:
                  type: string
                message:
                  type: string
                  description: Plain text body sent as a WhatsApp text message.
      responses:
        "200":
          description: Send result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Whatsapp_SendResult"
        4XX:
          $ref: "#/components/responses/ErrorResponse"
        5XX:
          $ref: "#/components/responses/ErrorResponse"
  /whatsapp/getLogs:
    post:
      tags:
        - whatsapp
      summary: List recent WhatsApp send logs for a company (most recent first).
      operationId: whatsapp.getLogs
      x-ipc-channel: whatsapp:getLogs
      x-window-api: window.api.whatsapp.getLogs
      x-controller: whatsappController.getLogs
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - company_id
              properties:
                company_id:
                  type: integer
                limit:
                  type: integer
                  default: 50
                  description: Max rows to return; service defaults to 50 when omitted.
      responses:
        "200":
          description: Logs result.
          content:
            application/json:
              schema:
                oneOf:
                  - type: object
                    required:
                      - success
                      - logs
                    properties:
                      success:
                        type: boolean
                        const: true
                      logs:
                        type: array
                        items:
                          $ref: "#/components/schemas/WhatsappLog"
                  - $ref: "#/components/schemas/Whatsapp_FailureResult"
        4XX:
          $ref: "#/components/responses/ErrorResponse"
        5XX:
          $ref: "#/components/responses/ErrorResponse"
  /whatsapp/verifyWebhook:
    post:
      tags:
        - whatsapp
      summary: Verify a Meta webhook subscription handshake (hub.mode/token/challenge).
      operationId: whatsapp.verifyWebhook
      x-ipc-channel: whatsapp:verifyWebhook
      x-window-api: window.api.whatsapp.verifyWebhook
      x-controller: whatsappController.verifyWebhook
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - mode
                - token
                - challenge
                - verify_token
              properties:
                mode:
                  type: string
                  description: Meta's hub.mode; must equal "subscribe" to pass.
                token:
                  type: string
                  description: Meta's hub.verify_token presented in the request.
                challenge:
                  type: string
                  description: Echoed back on success.
                verify_token:
                  type: string
                  description: Expected token configured by the app to compare against `token`.
      responses:
        "200":
          description: Verification result.
          content:
            application/json:
              schema:
                oneOf:
                  - type: object
                    required:
                      - success
                      - challenge
                    properties:
                      success:
                        type: boolean
                        const: true
                      challenge:
                        type: string
                  - $ref: "#/components/schemas/Whatsapp_FailureResult"
        4XX:
          $ref: "#/components/responses/ErrorResponse"
        5XX:
          $ref: "#/components/responses/ErrorResponse"
components:
  schemas:
    Ai_KeyStatus:
      type: object
      properties:
        hasKey:
          type: boolean
        masked:
          type:
            - string
            - "null"
        provider:
          type:
            - string
            - "null"
          enum:
            - anthropic
            - gemini
            - null
        model:
          type:
            - string
            - "null"
    Ai_Proposal:
      type: object
      description: A reviewable write action the user must approve; the renderer calls
        `channel` with `args` on approval.
      properties:
        action:
          type: string
        channel:
          type: string
        args:
          type: object
          additionalProperties: true
        summary:
          type: string
        requiresApproval:
          type: boolean
    Ai_AskResult:
      type: object
      properties:
        success:
          type: boolean
        text:
          type: string
        error:
          type: string
        rounds:
          type: number
        capped:
          type: boolean
        proposals:
          type: array
          items:
            $ref: "#/components/schemas/Ai_Proposal"
    Attendance_Error:
      type: object
      additionalProperties: false
      required:
        - error
        - message
      properties:
        error:
          type: string
        message:
          type: string
    Attendance_SuccessEnvelope:
      type: object
      additionalProperties: false
      required:
        - success
      properties:
        success:
          const: true
    Attendance_FailureEnvelope:
      description: >
        Service-level failure. Every service method catches errors and returns {
        success: false, error: <message> } instead of throwing.
      type: object
      additionalProperties: false
      required:
        - success
        - error
      properties:
        success:
          const: false
        error:
          type: string
    Attendance_CompanyIdScalar:
      description: Bare company_id scalar passed as the IPC argument.
      type: object
      additionalProperties: false
      required:
        - company_id
      properties:
        company_id:
          type: integer
          description: companies.company_id (passed directly, not wrapped).
    Attendance_GetNextNumberInput:
      description: >
        Controller destructures { company_id }. Preload wraps the scalar
        company_id into this object automatically.
      type: object
      additionalProperties: false
      required:
        - company_id
      properties:
        company_id:
          type: integer
    AttendanceVoucherIdScalar:
      description: Bare attendance_voucher_id scalar passed as the IPC argument.
      type: object
      additionalProperties: false
      required:
        - id
      properties:
        id:
          type: integer
          description: attendance_vouchers.attendance_voucher_id.
    AttendanceVoucherEntryInput:
      type: object
      additionalProperties: false
      properties:
        employee_id:
          type:
            - integer
            - "null"
          description: employees.employee_id; null/omitted -> stored NULL.
        attendance_type_id:
          type:
            - integer
            - "null"
          description: attendance_types.attendance_type_id; null/omitted -> stored NULL.
        value:
          type: number
          description: Quantity/value for the entry; coerced via Number(...), defaults to 0.
    AttendanceVoucherCreateInput:
      type: object
      additionalProperties: false
      required:
        - company_id
        - date
      properties:
        company_id:
          type: integer
          description: Owning company (companies.company_id).
        voucher_number:
          type:
            - string
            - "null"
          description: >
            Optional. If falsy, the service auto-generates ATT-NNNNN via
            generateVoucherNumber(company_id).
        date:
          type: string
          format: date
          description: Voucher date (stored as TEXT in SQLite; NOT NULL).
        narration:
          type:
            - string
            - "null"
          description: Optional free-text note.
        entries:
          type: array
          description: Optional list of per-employee entries inserted in the same
            transaction.
          items:
            $ref: "#/components/schemas/AttendanceVoucherEntryInput"
    AttendanceVoucher:
      description: A row of attendance_vouchers (returned as-is by SELECT *).
      type: object
      properties:
        attendance_voucher_id:
          type: integer
        company_id:
          type: integer
        voucher_number:
          type:
            - string
            - "null"
        date:
          type: string
        narration:
          type:
            - string
            - "null"
        created_at:
          type:
            - string
            - "null"
          description: ISO datetime string (DEFAULT datetime('now')).
        updated_at:
          type:
            - string
            - "null"
          description: ISO datetime string (DEFAULT datetime('now')).
    AttendanceVoucherEntryRow:
      description: >
        A row of attendance_voucher_entries enriched by getById's JOIN with
        employees and attendance_types.
      type: object
      properties:
        entry_id:
          type: integer
        attendance_voucher_id:
          type: integer
        employee_id:
          type:
            - integer
            - "null"
        attendance_type_id:
          type:
            - integer
            - "null"
        value:
          type:
            - number
            - "null"
        employee_name:
          type:
            - string
            - "null"
          description: employees.name (via LEFT JOIN).
        employee_number:
          type:
            - string
            - "null"
          description: employees.employee_code aliased as employee_number (via LEFT JOIN).
        attendance_type_name:
          type:
            - string
            - "null"
          description: attendance_types.name (via LEFT JOIN).
    AttendanceCreateResult:
      type: object
      additionalProperties: false
      required:
        - success
        - attendance_voucher_id
        - voucher_number
      properties:
        success:
          const: true
        attendance_voucher_id:
          type: integer
        voucher_number:
          type: string
    AttendanceVoucherListResult:
      type: object
      additionalProperties: false
      required:
        - success
        - vouchers
      properties:
        success:
          const: true
        vouchers:
          type: array
          items:
            $ref: "#/components/schemas/AttendanceVoucher"
    AttendanceVoucherDetailResult:
      type: object
      additionalProperties: false
      required:
        - success
        - voucher
      properties:
        success:
          const: true
        voucher:
          allOf:
            - $ref: "#/components/schemas/AttendanceVoucher"
            - type: object
              properties:
                entries:
                  type: array
                  items:
                    $ref: "#/components/schemas/AttendanceVoucherEntryRow"
    Attendance_NextNumberResult:
      type: object
      additionalProperties: false
      required:
        - success
        - nextNumber
        - voucher_number
      properties:
        success:
          const: true
        nextNumber:
          type: string
          description: e.g. "ATT-00001".
        voucher_number:
          type: string
          description: Same value as nextNumber.
    AttendanceType:
      type: object
      description: A row of the attendance_types table. Maps to Postgres table
        attendance_types.
      properties:
        attendance_type_id:
          type: integer
          description: Primary key.
        company_id:
          type: integer
          description: Owning company (FK -> companies.company_id).
        name:
          type: string
        alias:
          type:
            - string
            - "null"
        type:
          type: string
          description: Category label, e.g. "Attendance / Leave with Pay", "Leave",
            "Production".
          default: Attendance / Leave with Pay
        unit_id:
          type:
            - integer
            - "null"
          description: FK -> payroll_units.payroll_unit_id.
        period:
          type: string
          default: Per Day
        carry_forward:
          type:
            - integer
            - boolean
          description: Stored as 0/1 integer in SQLite (boolean flag). 0 = false, 1 = true.
          default: 0
        encashment:
          type:
            - integer
            - boolean
          description: Stored as 0/1 integer in SQLite (boolean flag). 0 = false, 1 = true.
          default: 0
        max_days:
          type: number
          description: Maximum days (quantity). Stored as REAL in SQLite.
          default: 0
        is_active:
          type:
            - integer
            - boolean
          description: Soft-delete flag. 0/1 in SQLite. 0 = false, 1 = true.
          default: 1
        is_predefined:
          type:
            - integer
            - boolean
          description: Seeded/system row that cannot be edited or deleted. 0/1 in SQLite.
          default: 0
        created_at:
          type: string
          description: ISO-8601 datetime string (SQLite datetime('now')).
        updated_at:
          type: string
          description: ISO-8601 datetime string (SQLite datetime('now')).
      required:
        - attendance_type_id
        - company_id
        - name
    AttendanceTypeCreateInput:
      type: object
      description: Payload for attendanceType:create (data object destructured by the
        service).
      additionalProperties: false
      required:
        - company_id
        - name
      properties:
        company_id:
          type: integer
          description: Owning company id (required).
        name:
          type: string
          description: Attendance type name (required, must be unique among active rows,
            case-insensitive).
        alias:
          type: string
          description: Optional alias. Defaults to null.
        type:
          type: string
          description: Category label. Defaults to "Attendance / Leave with Pay".
        unit_id:
          type: integer
          description: Optional payroll unit id. Defaults to null.
        period:
          type: string
          description: Defaults to "Per Day".
        carry_forward:
          type:
            - integer
            - boolean
          description: Defaults to 0.
        encashment:
          type:
            - integer
            - boolean
          description: Defaults to 0.
        max_days:
          type: number
          description: Defaults to 0.
    AttendanceTypeUpdateInput:
      type: object
      description: >
        Payload for attendanceType:update. attendance_type_id is required to
        locate the row; all other fields fall back to the current row value when
        omitted (?? coalescing).
      additionalProperties: false
      required:
        - attendance_type_id
      properties:
        attendance_type_id:
          type: integer
        name:
          type: string
        alias:
          type:
            - string
            - "null"
        type:
          type: string
        unit_id:
          type:
            - integer
            - "null"
        period:
          type: string
        carry_forward:
          type:
            - integer
            - boolean
        encashment:
          type:
            - integer
            - boolean
        max_days:
          type: number
    AttendanceTypeMutationResult:
      type: object
      description: Common single-row result envelope returned by create/getById/update.
      additionalProperties: false
      required:
        - success
      properties:
        success:
          type: boolean
        attendanceType:
          $ref: "#/components/schemas/AttendanceType"
        error:
          type: string
          description: Present when success is false.
    AttendanceType_Error:
      type: object
      description: Shared error envelope.
      additionalProperties: false
      required:
        - error
        - message
      properties:
        error:
          type: string
        message:
          type: string
    BalanceSheetReport_Error:
      type: object
      description: Shared transport-level error.
      required:
        - error
        - message
      properties:
        error:
          type: string
        message:
          type: string
    BalanceSheetReport_ServiceError:
      type: object
      description: >
        Service-level failure envelope returned by every method in this module
        on a caught exception or not-found condition. The service never throws;
        it returns this shape.
      required:
        - success
        - error
      properties:
        success:
          const: false
        error:
          type: string
          description: Error message (err.message, 'Report not found', etc.).
    BalanceSheetReport:
      type: object
      description: A row of the balance_sheet_reports table (report header).
      properties:
        report_id:
          type: integer
        company_id:
          type: integer
        report_name:
          type: string
          default: Balance Sheet
        report_date:
          type:
            - string
            - "null"
          format: date
          description: Date-only string (YYYY-MM-DD). Defaults to today's date on create.
        comparison_period_start:
          type:
            - string
            - "null"
          format: date
        comparison_period_end:
          type:
            - string
            - "null"
          format: date
        format_type:
          type: string
          default: Vertical
        method_of_showing:
          type: string
          default: Net Balance
        show_vertical_balance_sheet:
          type: integer
          description: 0/1 boolean flag.
          default: 1
        show_working_capital_figures:
          type: integer
          description: 0/1 boolean flag.
          default: 0
        profit_or_loss_as_liability:
          type: integer
          description: 0/1 boolean flag.
          default: 1
        show_detail_view:
          type: integer
          description: 0/1 boolean flag.
          default: 0
        show_condensed_view:
          type: integer
