          enum:
            - 0
            - 1
        success_screen_shown:
          type: integer
          enum:
            - 0
            - 1
        show_more_features:
          type: integer
          enum:
            - 0
            - 1
        show_all_features:
          type: integer
          enum:
            - 0
            - 1
        default_features_loaded:
          type: integer
          enum:
            - 0
            - 1
        feature_setup_completed:
          type: integer
          enum:
            - 0
