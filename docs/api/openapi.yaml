          description: The stored voucher number (provided or auto-generated).
      required:
        - success
        - physical_stock_entry_id
        - voucher_no
    PhysicalStockListResult:
      type: object
      description: Success result of getAll.
      properties:
        success:
          type: boolean
          const: true
        entries:
          type: array
          items:
            $ref: "#/components/schemas/PhysicalStockEntryRow"
      required:
        - success
        - entries
    PhysicalStockGetByIdResult:
      type: object
      description: Success result of getById (header + nested lines).
      properties:
        success:
          type: boolean
          const: true
        entry:
          allOf:
            - $ref: "#/components/schemas/PhysicalStockEntryRow"
            - type: object
              properties:
                lines:
                  type: array
                  items:
                    $ref: "#/components/schemas/PhysicalStockLineRowJoined"
              required:
                - lines
      required:
        - success
        - entry
    PhysicalStock_NextNumberResult:
      type: object
      description: Success result of getNextNumber.
      properties:
        success:
          type: boolean
          const: true
        nextNumber:
          type: string
          description: Next voucher number, e.g. "PST-00001".
        voucher_number:
          type: string
          description: Duplicate of nextNumber (both keys returned).
      required:
        - success
        - nextNumber
        - voucher_number
    PhysicalStockEntryRow:
      type: object
      description: A row of physical_stock_entries (SELECT *). Booleans are stored as
        0/1 integers in SQLite and returned as-is.
      properties:
        physical_stock_entry_id:
          type: integer
        company_id:
          type: integer
        voucher_no:
          type: string
          nullable: true
        voucher_date:
          type: string
        reference_no:
          type: string
          nullable: true
        narration:
          type: string
          nullable: true
        is_optional:
          type: integer
          description: 0 or 1.
        is_post_dated:
          type: integer
          description: 0 or 1.
        created_at:
          type: string
          description: ISO datetime string (datetime('now')).
        updated_at:
          type: string
          description: ISO datetime string (datetime('now')).
      required:
        - physical_stock_entry_id
        - company_id
        - voucher_date
    PhysicalStockLineRowJoined:
      type: object
      description: A row of physical_stock_entry_lines (l.*) plus joined display
        names. Returned by getById.
      properties:
        line_id:
          type: integer
        physical_stock_entry_id:
          type: integer
        stock_item_id:
          type: integer
          nullable: true
        godown_id:
          type: integer
          nullable: true
        batch_no:
          type: string
          nullable: true
        lot_no:
          type: string
          nullable: true
        manufacturing_date:
          type: string
          nullable: true
        expiry_date:
          type: string
          nullable: true
        quantity:
          type: number
        rate:
          type: number
        amount:
          type: number
        line_order:
          type: integer
        created_at:
          type: string
        updated_at:
          type: string
        item_name:
          type: string
          nullable: true
          description: "Joined stock_items.name. WARNING: the join condition in the source
            (i.stock_item_id = l.stock_item_id) references a non-existent column
            on stock_items (PK is item_id), so this is effectively always NULL
            until fixed."
        godown_name:
          type: string
          nullable: true
          description: Joined godowns.name.
      required:
        - line_id
        - physical_stock_entry_id
    PriceLevels_PriceLevel:
      type: object
      description: >
        A single price_levels table row. NOTE: the service layer never returns
        full rows to the renderer — it collapses rows into a name array (see
        PriceLevelsArrayResult). This schema documents the underlying table.
      properties:
        price_level_id:
          type: integer
          description: Primary key (AUTOINCREMENT).
        company_id:
          type: integer
          description: Owning company. FK -> companies.company_id (ON DELETE CASCADE).
        level_index:
          type: integer
          description: Zero-based ordinal position of this price level within the company.
        name:
          type: string
          description: Display name of the price level (defaults to empty string).
        is_active:
          type: boolean
          description: >
            Active flag. Stored in SQLite as INTEGER 0/1 (default 1); 0 ->
            false, 1 -> true.
        created_at:
          type: string
          description: ISO-8601 datetime string (SQLite datetime('now')).
        updated_at:
          type: string
          description: ISO-8601 datetime string (SQLite datetime('now')).
      required:
        - price_level_id
        - company_id
        - level_index
        - name
    PriceLevelsArrayResult:
      type: object
      description: >
        Standard envelope returned by get/save. `data` is a sparse array of
        price-level name strings indexed by level_index (gaps filled with '').
      properties:
        success:
          type: boolean
          description: True when the operation succeeded.
        data:
          type: array
          description: Price-level names indexed by level_index. Empty array when none
            exist.
          items:
            type: string
        error:
          type: string
          description: Present only when success is false.
      required:
        - success
    PriceLevels_SuccessResult:
      type: object
      description: Minimal success envelope (returned by delete).
      properties:
        success:
          type: boolean
        error:
          type: string
          description: Present only when success is false.
      required:
        - success
    PriceLevels_Error:
      type: object
      description: >
        Shared error shape. NOTE: this module's service actually returns errors
        as { success:false, error:<string> } rather than { error, message }. The
        canonical Error schema is documented here for cross-module consistency;
        the `error` field carries the human-readable message.
      properties:
        error:
          type: string
        message:
          type: string
      required:
        - error
    PriceList_Error:
      type: object
      description: Shared error shape for 4xx/5xx transport-level failures.
      properties:
        error:
          type: string
        message:
          type: string
      required:
        - error
        - message
    PriceListLineInput:
      type: object
      description: One line item supplied when creating/updating a price list.
      properties:
        item_id:
          type:
            - integer
            - "null"
          description: stock_items.item_id; null when the line is not tied to a stock
            item. Defaults to null.
        particulars:
          type: string
          description: Free-text description of the line (NOT NULL in storage).
        qty_from:
          type: number
          description: Lower quantity bound for this slab. Defaults to 0.
        qty_less_than:
          type: number
          description: Upper (exclusive) quantity bound for this slab. Defaults to 0.
        rate:
          type: number
          description: Rate / price for this slab. Defaults to 0.
        disc_percent:
          type: number
          description: Discount percentage for this slab. Defaults to 0.
      required:
        - particulars
    PriceListCreateInput:
      type: object
      description: >
        Payload destructured by priceListService.create. sort_order is assigned
        by the server from the array index and is not accepted from the client.
      properties:
        company_id:
          type: integer
          description: Owning company (required). companies.company_id.
        stock_group:
          type: string
          description: Stock group filter. Defaults to 'All Items' when falsy.
        price_level:
          type: string
          description: Price level / tier name (required).
        applicable_from:
          type: string
          description: Date the price list takes effect (stored as TEXT; required).
        lines:
          type: array
          minItems: 1
          description: At least one line is required.
          items:
            $ref: "#/components/schemas/PriceListLineInput"
      required:
        - company_id
        - price_level
        - applicable_from
        - lines
    PriceListUpdateInput:
      type: object
      description: >
        Payload destructured by priceListService.update. Note `id` (not
        price_list_id) is the header key. company_id is destructured but NOT
        used by the UPDATE SQL (company ownership is immutable here). Lines are
        fully replaced.
      properties:
        id:
          type: integer
          description: price_lists.price_list_id of the record to update (required).
        company_id:
          type: integer
          description: Accepted but ignored by the update SQL.
        stock_group:
          type: string
          description: Defaults to 'All Items' when falsy.
        price_level:
          type: string
          description: Price level / tier name (required).
        applicable_from:
          type: string
          description: Effective date (required).
        lines:
          type: array
          minItems: 1
          description: At least one line is required; replaces all existing lines.
          items:
            $ref: "#/components/schemas/PriceListLineInput"
      required:
        - id
        - price_level
        - applicable_from
        - lines
    PriceListLine:
      type: object
      description: A row of the price_list_lines table (as returned by SELECT *).
      properties:
        line_id:
          type: integer
        price_list_id:
          type: integer
        item_id:
          type:
            - integer
            - "null"
        particulars:
          type: string
        qty_from:
          type: number
        qty_less_than:
          type: number
        rate:
          type: number
        disc_percent:
          type: number
        sort_order:
          type: integer
        created_at:
          type: string
          description: ISO-8601 datetime string (SQLite datetime('now')).
        updated_at:
          type: string
          description: ISO-8601 datetime string (SQLite datetime('now')).
    PriceList:
      type: object
      description: >
        A row of the price_lists table (SELECT *) with its child lines attached
        under `lines`.
      properties:
        price_list_id:
          type: integer
        company_id:
          type: integer
        stock_group:
          type: string
        price_level:
          type: string
        applicable_from:
          type: string
        is_active:
          type: integer
          description: 1 = active, 0 = soft-deleted.
        created_at:
          type: string
          description: ISO-8601 datetime string.
        updated_at:
          type: string
          description: ISO-8601 datetime string.
        lines:
          type: array
          items:
            $ref: "#/components/schemas/PriceListLine"
    PriceList_SuccessEnvelope:
      type: object
      description: Minimal envelope returned by delete on success.
      properties:
        success:
          type: boolean
        error:
          type: string
          description: Present only when success is false.
      required:
        - success
    PriceListEnvelope:
      type: object
      description: Envelope for single-record operations (create, getById, update).
      properties:
        success:
          type: boolean
        data:
          $ref: "#/components/schemas/PriceList"
        error:
          type: string
          description: Present only when success is false.
      required:
        - success
    PriceListListEnvelope:
      type: object
      description: Envelope for getAll; data is an array of price lists.
      properties:
        success:
          type: boolean
        data:
          type: array
          items:
            $ref: "#/components/schemas/PriceList"
        error:
          type: string
          description: Present only when success is false.
      required:
        - success
    ProfitLossReport_Error:
      type: object
      description: Standard transport-level error envelope.
      properties:
        error:
          type: string
        message:
          type: string
      required:
        - error
        - message
    ProfitLossReport_ServiceFailure:
      type: object
      description: >
        Service-level failure envelope. The service swallows exceptions and
        resolves with this shape instead of rejecting the IPC call.
      properties:
        success:
          type: boolean
          const: false
        error:
          type: string
      required:
        - success
        - error
    ProfitLossReport:
      type: object
      description: A row of the profit_loss_reports table (the saved P&L report header).
      properties:
        report_id:
          type: integer
          description: PK (SQLite INTEGER PRIMARY KEY AUTOINCREMENT).
        company_id:
          type: integer
          description: FK -> companies.company_id (explicit in source).
        report_name:
          type: string
          default: Profit & Loss A/c
        report_date:
          type:
            - string
            - "null"
          format: date
          description: Date-only TEXT.
        period_start:
          type:
            - string
            - "null"
          format: date
        period_end:
          type:
            - string
            - "null"
          format: date
        format_type:
          type: string
          default: Vertical
        compare_with_previous_period:
          type: boolean
          description: Stored 0/1 in SQLite.
        comparison_period_start:
          type:
            - string
            - "null"
          format: date
        comparison_period_end:
          type:
            - string
            - "null"
          format: date
        basis_of_values:
          type: string
          default: Default
        change_view:
          type:
            - string
            - "null"
        exception_report_enabled:
          type: boolean
          description: Stored 0/1.
        saved_view_name:
          type:
            - string
            - "null"
        filter_enabled:
          type: boolean
          description: Stored 0/1.
        filter_details:
          type:
            - string
            - "null"
          description: Free-form/serialized filter payload (TEXT).
        show_detail_view:
          type: boolean
          description: Stored 0/1.
        show_condensed_view:
          type: boolean
          description: Stored 0/1.
        show_percentage_of_sales:
          type: boolean
          description: Stored 0/1.
        show_auto_column:
          type: boolean
          description: Stored 0/1.
        show_profit:
          type: boolean
          default: true
          description: Stored 0/1
          defaults 1.: null
        show_optional:
          type: boolean
          description: Stored 0/1.
        show_post_dated:
          type: boolean
          description: Stored 0/1.
        show_stat_adjustment:
          type: boolean
          description: Stored 0/1.
        show_schedule_vi:
          type: boolean
          description: Stored 0/1.
        created_at:
          type: string
          format: date-time
          description: ISO-8601 string (datetime('now')).
        updated_at:
          type: string
          format: date-time
          description: ISO-8601 string (datetime('now')).
      required:
        - report_id
        - company_id
    ProfitLossReport_ProfitLossView:
      type: object
      description: A row of the profit_loss_views table (one section/group line of a
        saved report).
      properties:
        view_id:
          type: integer
          description: PK (SQLite INTEGER PRIMARY KEY AUTOINCREMENT).
        report_id:
          type: integer
          description: FK -> profit_loss_reports.report_id (explicit in source).
        company_id:
          type: integer
          description: FK -> companies.company_id (explicit in source).
        report_date:
          type:
            - string
            - "null"
          format: date
        section:
          type: string
          default: Income
          description: One of Income / Expense / GrossProfit / NetProfit (used to group
            rows on read).
        group_name:
          type:
            - string
            - "null"
        parent_group_name:
          type:
            - string
            - "null"
        opening_balance:
          type: number
          default: 0
          description: MONEY — NUMERIC(18
          2): null
          not float.: null
        current_period_amount:
          type: number
          default: 0
          description: MONEY — NUMERIC(18
          2): null
          not float.: null
        closing_balance:
          type: number
          default: 0
          description: MONEY — NUMERIC(18
          2): null
          not float.: null
        display_order:
          type: integer
          default: 0
        is_total_row:
          type: boolean
          description: Stored 0/1.
        is_gross_profit_row:
          type: boolean
          description: Stored 0/1.
        is_drill_down_available:
          type: boolean
          default: true
          description: Stored 0/1
          defaults 1.: null
        created_at:
          type: string
          format: date-time
          description: ISO-8601 string (datetime('now')).
      required:
        - view_id
        - report_id
        - company_id
    ProfitLossReportWithSections:
      description: >
        Returned by getById — the report header plus its view rows split by
        section.
      allOf:
        - $ref: "#/components/schemas/ProfitLossReport"
        - type: object
          properties:
            income:
              type: array
              items:
                $ref: "#/components/schemas/ProfitLossReport_ProfitLossView"
              description: Rows where section = 'Income'.
            expenses:
              type: array
              items:
                $ref: "#/components/schemas/ProfitLossReport_ProfitLossView"
              description: Rows where section = 'Expense'.
            grossProfit:
              type: array
              items:
                $ref: "#/components/schemas/ProfitLossReport_ProfitLossView"
              description: Rows where section = 'GrossProfit'.
            netProfit:
              type: array
              items:
                $ref: "#/components/schemas/ProfitLossReport_ProfitLossView"
              description: Rows where section = 'NetProfit'.
    ProfitLossReport_ProfitLossViewInput:
      type: object
      description: One section row supplied on create (inserted into profit_loss_views).
      properties:
        section:
          type: string
          default: Income
        group_name:
          type:
            - string
            - "null"
        parent_group_name:
          type:
            - string
            - "null"
        opening_balance:
          type: number
          default: 0
        current_period_amount:
          type: number
          default: 0
        closing_balance:
          type: number
          default: 0
        display_order:
          type: integer
          description: Defaults to row index+1 if omitted.
        is_total_row:
          type: boolean
          default: false
        is_gross_profit_row:
          type: boolean
          default: false
        is_drill_down_available:
          type: boolean
          default: true
    ProfitLossReportCreateInput:
      type: object
      description: >
        Payload for profitLossReport:create. company_id is required; all other
        header fields fall back to documented defaults. `rows` (if present) are
        inserted into profit_loss_views.
      properties:
        company_id:
          type: integer
        report_name:
          type: string
          default: Profit & Loss A/c
        report_date:
          type: string
          format: date
          description: Defaults to today (YYYY-MM-DD) if omitted.
        period_start:
          type:
            - string
            - "null"
          format: date
        period_end:
          type:
            - string
            - "null"
          format: date
        format_type:
          type: string
          default: Vertical
        compare_with_previous_period:
          type: boolean
          default: false
        comparison_period_start:
          type:
            - string
            - "null"
          format: date
        comparison_period_end:
          type:
            - string
            - "null"
          format: date
        basis_of_values:
          type: string
          default: Default
        change_view:
          type:
            - string
            - "null"
        exception_report_enabled:
          type: boolean
          default: false
        saved_view_name:
          type:
            - string
            - "null"
        filter_enabled:
          type: boolean
          default: false
        filter_details:
          type:
            - string
            - "null"
        show_detail_view:
          type: boolean
          default: false
        show_condensed_view:
          type: boolean
          default: false
        show_percentage_of_sales:
          type: boolean
          default: false
        show_auto_column:
          type: boolean
          default: false
        show_profit:
          type: boolean
          default: true
        show_optional:
          type: boolean
          default: false
        show_post_dated:
          type: boolean
          default: false
        show_stat_adjustment:
          type: boolean
          default: false
        show_schedule_vi:
          type: boolean
          default: false
        rows:
          type: array
          description: Optional section rows persisted to profit_loss_views.
          items:
            $ref: "#/components/schemas/ProfitLossReport_ProfitLossViewInput"
      required:
        - company_id
    Report_Error:
      type: object
      description: >
        Failure envelope. In this module errors are returned in-band as `{
        success: false, error }`. The `message` field is included to satisfy the
        shared Error contract; the service populates `error`.
      properties:
        error:
          type: string
          description: Human-readable error reason (e.g. err.message, "Ledger not found").
        message:
          type: string
          description: Alias of error for shared-contract compatibility.
      required:
        - error
    Report_CompanyFyParams:
      type: object
      description: Company + financial-year scope shared by trialBalance, balanceSheet
        and profitLoss.
      properties:
        company_id:
          type: integer
          description: Target company id (FK -> companies.company_id).
        fy_id:
          type: integer
          description: Target financial year id (FK -> financial_years.fy_id).
      required:
        - company_id
        - fy_id
    Report_DateRangeParams:
      type: object
      description: Company + FY scope plus an optional inclusive date range. Used by
        cashBook and daybook.
      properties:
        company_id:
          type: integer
          description: Target company id (FK -> companies.company_id).
        fy_id:
          type: integer
          description: Target financial year id (FK -> financial_years.fy_id).
        from_date:
          type:
            - string
            - "null"
          format: date
          description: Optional inclusive lower bound on voucher date (ISO YYYY-MM-DD).
            Omitted/null => no lower bound.
        to_date:
          type:
            - string
            - "null"
          format: date
          description: Optional inclusive upper bound on voucher date (ISO YYYY-MM-DD).
            Omitted/null => no upper bound.
      required:
        - company_id
        - fy_id
    Report_LedgerReportParams:
      type: object
      description: Company + FY scope, a target ledger, plus an optional inclusive
        date range. Used by ledgerReport and bankBook.
      properties:
        company_id:
          type: integer
          description: Target company id (FK -> companies.company_id).
        fy_id:
          type: integer
          description: Target financial year id (FK -> financial_years.fy_id).
        ledger_id:
          type: integer
          description: Target ledger id (FK -> ledgers.ledger_id).
        from_date:
          type:
            - string
            - "null"
          format: date
          description: Optional inclusive lower bound on voucher date (ISO YYYY-MM-DD).
        to_date:
          type:
            - string
            - "null"
          format: date
          description: Optional inclusive upper bound on voucher date (ISO YYYY-MM-DD).
      required:
        - company_id
        - fy_id
        - ledger_id
    Report_TrialBalanceRow:
      type: object
      description: One active ledger's net position. Derived (computed), not a stored row.
      properties:
        ledger_id:
          type: integer
          description: Ledger id (from ledgers.ledger_id).
        ledger_name:
          type: string
          description: Ledger display name (from ledgers.name).
        group_id:
          type: integer
          description: Owning group id (from ledgers.group_id).
        debit:
          type: number
          description: Net debit balance if balance > 0, else 0 (currency).
        credit:
          type: number
          description: Net credit balance (abs of negative balance) if balance < 0, else 0
            (currency).
      required:
        - ledger_id
        - ledger_name
        - group_id
        - debit
        - credit
    Report_TrialBalanceResult:
      type: object
      properties:
        success:
          type: boolean
        rows:
          type: array
          items:
            $ref: "#/components/schemas/Report_TrialBalanceRow"
        totalDebit:
          type: number
          description: Sum of all row debits (currency).
        totalCredit:
          type: number
          description: Sum of all row credits (currency).
      required:
        - success
        - rows
        - totalDebit
        - totalCredit
    Report_BalanceSheetLedger:
      type: object
      description: One ledger balance grouped under Assets or Liabilities. Derived,
        not stored.
      properties:
        ledger_id:
          type: integer
        ledger_name:
          type: string
        balance:
          type: number
          description: Net signed balance (currency).
      required:
        - ledger_id
        - ledger_name
        - balance
    Report_BalanceSheetResult:
      type: object
      properties:
        success:
          type: boolean
        assets:
          type: array
          items:
            $ref: "#/components/schemas/Report_BalanceSheetLedger"
        liabilities:
          type: array
          items:
            $ref: "#/components/schemas/Report_BalanceSheetLedger"
        totalAssets:
          type: number
          description: Sum of abs(balance) over asset ledgers (currency).
        totalLiabilities:
          type: number
          description: Sum of abs(balance) over liability ledgers (currency).
      required:
        - success
        - assets
        - liabilities
        - totalAssets
        - totalLiabilities
    Report_ProfitLossLedger:
      type: object
      description: One income or expense ledger (abs balance). Derived, not stored.
      properties:
        ledger_id:
          type: integer
        ledger_name:
          type: string
        balance:
          type: number
          description: Absolute net balance (currency).
      required:
        - ledger_id
        - ledger_name
        - balance
    Report_ProfitLossResult:
      type: object
      properties:
        success:
          type: boolean
        income:
          type: array
          items:
            $ref: "#/components/schemas/Report_ProfitLossLedger"
        expenses:
