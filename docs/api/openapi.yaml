      operationId: voucherType.create
      x-ipc-channel: voucherType:create
      x-window-api: window.api.voucherType.create
      x-controller: voucherTypeController.create
      description: Rejects (success:false) if an active voucher type with the same
        name (case-insensitive) already exists for the company. Inserts a row
        into voucher_types (is_predefined forced to 0, is_active forced to 1)
        and a companion row into voucher_type_configs.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VoucherTypeCreateInput"
      responses:
        "200":
          description: Result envelope with the created voucher_types row.
          content:
            application/json:
              schema:
                oneOf:
                  - type: object
                    properties:
                      success:
                        const: true
                      voucherType:
                        $ref: "#/components/schemas/VoucherType"
                    required:
                      - success
                      - voucherType
                  - $ref: "#/components/schemas/VoucherType_FailureEnvelope"
        4XX:
          description: Validation/transport error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VoucherType_Error"
        5XX:
          description: Unexpected error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VoucherType_Error"
  /voucherType/getAll:
    post:
      tags:
        - voucherType
      summary: List all active voucher types for a company (with config flags joined).
      operationId: voucherType.getAll
      x-ipc-channel: voucherType:getAll
      x-window-api: window.api.voucherType.getAll
      x-controller: voucherTypeController.getAll
      description: Handler receives a bare company_id scalar (NOT an object). Returns
        active voucher types joined with selected config flags and a derived
        parent_name (COALESCE(parent.name, vt.name)). Ordered by is_predefined
        DESC, name ASC.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: integer
              description: The company_id. The IPC handler is invoked with this scalar as arg
                2 (window.api.voucherType.getAll(company_id)).
      responses:
        "200":
          description: Result envelope with the list of voucher types.
          content:
            application/json:
              schema:
                oneOf:
                  - type: object
                    properties:
                      success:
                        const: true
                      voucherTypes:
                        type: array
                        items:
                          $ref: "#/components/schemas/VoucherTypeWithConfigSummary"
                    required:
                      - success
                      - voucherTypes
                  - $ref: "#/components/schemas/VoucherType_FailureEnvelope"
        4XX:
          description: Validation/transport error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VoucherType_Error"
        5XX:
          description: Unexpected error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VoucherType_Error"
