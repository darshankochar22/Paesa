paths:
  /ai/getKeyStatus:
    post:
      operationId: ai.getKeyStatus
      tags:
        - ai
      summary: Get whether an Anthropic key is configured, its masked form, and the
        active model.
      x-ipc-channel: ai:getKeyStatus
      x-window-api: window.api.ai.getKeyStatus
      x-controller: aiController.getKeyStatus
      responses:
        "200":
          description: Key status.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Ai_KeyStatus"
  /ai/setKey:
    post:
      operationId: ai.setKey
      tags:
        - ai
      summary: Store the user's Anthropic API key (encrypted at rest in the main
        process).
      x-ipc-channel: ai:setKey
      x-window-api: window.api.ai.setKey
      x-controller: aiController.setKey
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                apiKey:
                  type: string
                  description: Anthropic key (starts with sk-).
              required:
                - apiKey
      responses:
        "200":
          description: Result with masked key on success.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  masked:
                    type: string
                  error:
                    type: string
  /ai/clearKey:
    post:
      operationId: ai.clearKey
      tags:
        - ai
      summary: Remove the stored Anthropic API key.
      x-ipc-channel: ai:clearKey
      x-window-api: window.api.ai.clearKey
      x-controller: aiController.clearKey
      responses:
        "200":
          description: Result.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
  /ai/testKey:
    post:
      operationId: ai.testKey
      tags:
        - ai
      summary: Validate a key with a tiny Anthropic ping (uses the stored key if none
        passed).
      x-ipc-channel: ai:testKey
      x-window-api: window.api.ai.testKey
      x-controller: aiController.testKey
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                apiKey:
                  type: string
      responses:
        "200":
          description: Validation result.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  error:
                    type: string
  /ai/ask:
    post:
      operationId: ai.ask
      tags:
        - ai
      summary: Ask the copilot. Runs a capped tool-use loop and returns the answer
        plus any write proposals to approve.
      x-ipc-channel: ai:ask
      x-window-api: window.api.ai.ask
      x-controller: aiController.ask
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                prompt:
                  type: string
                context:
                  type: object
                  properties:
                    company_id:
                      type: number
                    fy_id:
                      type: number
                history:
                  type: array
                  items:
                    type: object
                    properties:
                      role:
                        type: string
                        enum:
                          - user
                          - assistant
                      text:
                        type: string
              required:
                - prompt
      responses:
        "200":
          description: Copilot answer with optional action proposals.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Ai_AskResult"
