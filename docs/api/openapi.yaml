        company_id:
          type: integer
          description: Owning company id (NOT NULL).
        name:
          type: string
          description: Category name (NOT NULL). Duplicate active names per company are
            rejected.
        alias:
          type:
            - string
            - "null"
          description: Optional alias; defaults to null.
        description:
          type:
            - string
            - "null"
