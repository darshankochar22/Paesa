      tags:
        - master
      summary: Build the dynamic Masters navigation menu for a company, with sections
        toggled by the company's Tally feature flags.
      description: "Reads the company's Tally feature flags via
        tallyFeaturesService.get(company_id) and assembles a grouped menu.
        Sections are conditional: \"Payment Request\" appears only when
        enable_payment_request_qr is set; \"Inventory Masters\" appears only
        when maintain_inventory !== 0; the \"Cost Centre\" accounting item is
        appended again when enable_cost_centres is set (so it may be duplicated
        within \"Accounting Masters\"). The Statutory, Statutory Details and
        Payroll sections are always included."
      x-ipc-channel: master:getMenu
      x-window-api: window.api.master.getMenu
      x-controller: masterController.getMenu
      requestBody:
        required: false
        description: The controller receives the raw second IPC argument as company_id
          (a bare scalar, NOT an object). The service defaults it to 1 when
          undefined.
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Master_GetMenuRequest"
      responses:
        "200":
          description: Menu built successfully (or a handled error wrapped in the result).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Master_GetMenuResult"
        4XX:
          description: Client error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Master_Error"
        5XX:
          description: Server/unhandled error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Master_Error"
