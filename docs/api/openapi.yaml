    SalaryStructure:
      type: object
      description: One row of the salary_structures table (one pay head amount for an
        employee, effective from a date). Maps to the documented
        `salary_structures` Postgres table.
      properties:
        structure_id:
          type: integer
          description: Primary key (SQLite INTEGER PRIMARY KEY AUTOINCREMENT).
        company_id:
          type: integer
          description: Owning company (FK -> companies.company_id).
        employee_id:
          type: integer
          description: Employee (FK -> employees.employee_id).
        effective_from:
          type: string
          description: Effective-from date (date-only TEXT in SQLite).
        pay_head_id:
          type: integer
          description: Pay head (FK -> pay_heads.pay_head_id).
        amount:
          type: number
          description: Monetary amount for this pay head. SQLite REAL DEFAULT 0; treat as
            currency NUMERIC(18,2).
        calculation_mode:
          type: string
          description: How the amount is computed. SQLite TEXT DEFAULT 'Flat Rate'.
        is_active:
          type: integer
          enum:
            - 0
            - 1
          description: Soft-delete flag (0/1). Maps to BOOLEAN in Postgres (0 -> false, 1
            -> true).
        created_at:
          type: string
          description: ISO/SQLite datetime('now') string. Maps to TIMESTAMPTZ.
        updated_at:
          type: string
          description: ISO/SQLite datetime('now') string. Maps to TIMESTAMPTZ.
      required:
        - structure_id
        - company_id
        - employee_id
        - effective_from
        - pay_head_id
    SalaryStructureCreateInput:
      type: object
      description: Payload for create (controller passes `data` straight through).
      properties:
        company_id:
          type: integer
        employee_id:
          type: integer
        effective_from:
          type: string
          description: Effective-from date.
        pay_head_id:
          type: integer
        amount:
          type: number
          description: Defaults to 0 if omitted.
        calculation_mode:
          type: string
