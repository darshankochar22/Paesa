openapi: 3.1.0
info:
  title: Ledger Module API
  version: 1.0.0
  description: >
    IPC contract for the "ledger" backend module of the Electron + SQLite
    accounting/ERP app. Each operation models an `ipcMain.handle('ledger:<action>', ...)`
    channel. Transport is Electron IPC (not HTTP); the post + path convention
    here exists only so the contract renders and merges as standard OpenAPI 3.1.
    All handlers resolve to a `{ success: boolean, ... }` envelope; thrown errors
    are caught in the service and returned as `{ success: false, error }`.
tags:
  - name: ledger
    description: Chart-of-accounts ledger master plus bank and statutory sub-records.

paths:
  /ledger/create:
    post:
      tags: [ledger]
      operationId: ledger.create
      summary: Create a ledger (with optional bank & statutory details). Rejects duplicate active names per company.
      x-ipc-channel: "ledger:create"
      x-window-api: "window.api.ledger.create"
      x-controller: "ledgerController.create"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LedgerCreateInput'
      responses:
        '200':
          description: Created ledger row, or a failure envelope (e.g. duplicate name).
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/LedgerSingleResult'
                  - $ref: '#/components/schemas/FailureResult'
        '4XX':
          $ref: '#/components/responses/Error'
        '5XX':
          $ref: '#/components/responses/Error'

  /ledger/getAll:
    post:
      tags: [ledger]
      operationId: ledger.getAll
      summary: List all active ledgers for a company (joined with group name).
      x-ipc-channel: "ledger:getAll"
      x-window-api: "window.api.ledger.getAll"
      x-controller: "ledgerController.getAll"
      requestBody:
        required: true
        description: The handler receives a bare company_id (not an object).
        content:
          application/json:
            schema:
              type: object
              properties:
                company_id:
                  type: integer
                  description: Bare scalar passed as IPC arg 2.
              required: [company_id]
      responses:
        '200':
          description: Array of active ledger rows (each with an extra group_name).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LedgerListResult'
        '4XX':
          $ref: '#/components/responses/Error'
        '5XX':
          $ref: '#/components/responses/Error'

  /ledger/getById:
    post:
      tags: [ledger]
      operationId: ledger.getById
      summary: Fetch one ledger with its bank_details and statutory_details nested.
      x-ipc-channel: "ledger:getById"
      x-window-api: "window.api.ledger.getById"
      x-controller: "ledgerController.getById"
      requestBody:
        required: true
        description: The handler receives a bare ledger_id (not an object).
        content:
          application/json:
            schema:
              type: object
              properties:
                id:
                  type: integer
                  description: ledger_id, passed as a bare scalar IPC arg 2.
              required: [id]
      responses:
        '200':
          description: Ledger with nested sub-records, or not-found failure.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/LedgerDetailResult'
                  - $ref: '#/components/schemas/FailureResult'
        '4XX':
          $ref: '#/components/responses/Error'
        '5XX':
          $ref: '#/components/responses/Error'

  /ledger/update:
    post:
      tags: [ledger]
      operationId: ledger.update
      summary: Update a ledger (and replace bank/statutory rows). Predefined ledgers are blocked.
      x-ipc-channel: "ledger:update"
      x-window-api: "window.api.ledger.update"
      x-controller: "ledgerController.update"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LedgerUpdateInput'
      responses:
        '200':
          description: Updated ledger row, or failure (not found / predefined).
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/LedgerSingleResult'
                  - $ref: '#/components/schemas/FailureResult'
        '4XX':
          $ref: '#/components/responses/Error'
        '5XX':
          $ref: '#/components/responses/Error'

  /ledger/delete:
    post:
      tags: [ledger]
      operationId: ledger.delete
      summary: Soft-delete a ledger (sets is_active = 0). Predefined ledgers are blocked.
      x-ipc-channel: "ledger:delete"
      x-window-api: "window.api.ledger.delete"
      x-controller: "ledgerController.delete"
      requestBody:
        required: true
        description: The handler receives a bare ledger_id (not an object).
        content:
          application/json:
            schema:
              type: object
              properties:
                id:
                  type: integer
                  description: ledger_id, passed as a bare scalar IPC arg 2.
              required: [id]
      responses:
        '200':
          description: Success envelope, or failure (not found / predefined).
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/SuccessResult'
                  - $ref: '#/components/schemas/FailureResult'
        '4XX':
          $ref: '#/components/responses/Error'
        '5XX':
          $ref: '#/components/responses/Error'

  /ledger/getByGroup:
    post:
      tags: [ledger]
      operationId: ledger.getByGroup
      summary: List active ledgers for a company filtered by group.
      x-ipc-channel: "ledger:getByGroup"
      x-window-api: "window.api.ledger.getByGroup"
      x-controller: "ledgerController.getByGroup"
      requestBody:
        required: true
        description: >
          Controller destructures { company_id, group_id }. The renderer binding
          getByGroup(company_id, groupId) maps the 2nd arg to group_id.
        content:
          application/json:
            schema:
              type: object
              properties:
                company_id:
                  type: integer
                group_id:
                  type: integer
              required: [company_id, group_id]
      responses:
        '200':
          description: Array of matching active ledger rows.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LedgerListResult'
        '4XX':
          $ref: '#/components/responses/Error'
        '5XX':
          $ref: '#/components/responses/Error'

components:
  responses:
    Error:
      description: Unexpected error (transport / unhandled).
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

  schemas:
    Error:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
      required: [error, message]

    SuccessResult:
      type: object
      properties:
        success:
          type: boolean
          const: true
      required: [success]

    FailureResult:
      type: object
      description: Returned by the service when validation fails or a row is missing.
      properties:
        success:
          type: boolean
          const: false
        error:
          type: string
      required: [success, error]

    Ledger:
      type: object
      description: A row of the `ledgers` table. Boolean-ish columns are stored as 0/1 integers in SQLite.
      properties:
        ledger_id: { type: integer }
        company_id: { type: integer }
        group_id: { type: [integer, "null"] }
        name: { type: string }
        alias: { type: [string, "null"] }
        ledger_type: { type: string, default: "General" }
        nature: { type: [string, "null"] }
        opening_balance: { type: number, description: "Currency amount." }
        closing_balance: { type: number, description: "Currency amount." }
        is_bill_wise: { type: integer, enum: [0, 1] }
        maintain_inventory_values: { type: integer, enum: [0, 1] }
        mailing_name: { type: [string, "null"] }
        address1: { type: [string, "null"] }
        address2: { type: [string, "null"] }
        city: { type: [string, "null"] }
        state: { type: [string, "null"] }
        country: { type: [string, "null"] }
        pincode: { type: [string, "null"] }
        phone: { type: [string, "null"] }
        email: { type: [string, "null"] }
        gstin: { type: [string, "null"] }
        pan: { type: [string, "null"] }
        registration_type: { type: string, default: "Unregistered" }
        allow_cost_centres: { type: integer, enum: [0, 1] }
        default_credit_period: { type: integer }
        check_credit_days: { type: integer }
        invoice_rounding: { type: integer, enum: [0, 1] }
        rounding_method: { type: [string, "null"] }
        rounding_limit: { type: number }
        additional_gst_details: { type: integer, enum: [0, 1] }
        service_tax_details: { type: integer, enum: [0, 1] }
        include_assessable_value: { type: string, default: "Not Applicable" }
        method_of_calculation: { type: string, default: "Based on Value" }
        other_statutory_details: { type: integer, enum: [0, 1] }
        is_active: { type: integer, enum: [0, 1], default: 1 }
        is_predefined: { type: integer, enum: [0, 1], default: 0 }
        created_at: { type: string, description: "ISO-8601 datetime string." }
        updated_at: { type: string, description: "ISO-8601 datetime string." }

    LedgerWithGroup:
      allOf:
        - $ref: '#/components/schemas/Ledger'
        - type: object
          properties:
            group_name:
              type: [string, "null"]
              description: From LEFT JOIN groups (not a column of ledgers).

    LedgerBankDetails:
      type: object
      description: A row of `ledger_bank_details`.
      properties:
        id: { type: integer }
        ledger_id: { type: integer }
        account_holder_name: { type: [string, "null"] }
        account_number: { type: [string, "null"] }
        ifsc_code: { type: [string, "null"] }
        swift_code: { type: [string, "null"] }
        bank_name: { type: [string, "null"] }
        branch_name: { type: [string, "null"] }
        bank_configuration: { type: [string, "null"] }
        cheque_book_start_no: { type: [string, "null"] }
        cheque_book_end_no: { type: [string, "null"] }
        enable_cheque_printing: { type: integer, enum: [0, 1] }
        cheque_printing_configuration: { type: [string, "null"] }
        od_limit: { type: number, description: "Currency amount (overdraft limit)." }
        transaction_type: { type: [string, "null"] }
        cross_using: { type: [string, "null"], default: "A/c Payee" }
        company_bank: { type: [string, "null"] }

    LedgerStatutoryDetails:
      type: object
      description: A row of `ledger_statutory_details`.
      properties:
        id: { type: integer }
        ledger_id: { type: integer }
        gst_applicability: { type: string, default: "Not Applicable" }
        hsn_sac_code: { type: [string, "null"] }
        hsn_sac_description: { type: [string, "null"] }
        gst_rate: { type: number }
        cgst_rate: { type: number }
        sgst_rate: { type: number }
        igst_rate: { type: number }
        type_of_duty_tax: { type: [string, "null"] }
        percentage_of_calculation: { type: number }
        statutory_details: { type: [string, "null"] }
        include_in_assessable_value_calculation: { type: string, default: "Not Applicable" }
        appropriate_to: { type: string, default: "Goods" }
        method_of_calculation: { type: string, default: "Based on Quantity" }

    LedgerSingleResult:
      type: object
      properties:
        success: { type: boolean, const: true }
        ledger: { $ref: '#/components/schemas/Ledger' }
      required: [success, ledger]

    LedgerListResult:
      type: object
      properties:
        success: { type: boolean, const: true }
        ledgers:
          type: array
          items: { $ref: '#/components/schemas/LedgerWithGroup' }
      required: [success, ledgers]

    LedgerDetailResult:
      type: object
      properties:
        success: { type: boolean, const: true }
        ledger:
          allOf:
            - $ref: '#/components/schemas/Ledger'
            - type: object
              properties:
                bank_details:
                  oneOf:
                    - $ref: '#/components/schemas/LedgerBankDetails'
                    - type: "null"
                statutory_details:
                  oneOf:
                    - $ref: '#/components/schemas/LedgerStatutoryDetails'
                    - type: "null"
      required: [success, ledger]

    LedgerCreateInput:
      type: object
      description: >
        Payload for ledger:create. is_active/is_predefined are forced server-side
        (1 and 0). Boolean-ish inputs are coerced to 0/1. Missing fields fall back
        to documented defaults.
      properties:
        company_id: { type: integer }
        group_id: { type: [integer, "null"] }
        name: { type: string }
        alias: { type: [string, "null"] }
        ledger_type: { type: string, default: "General" }
        nature: { type: [string, "null"] }
        opening_balance: { type: number, default: 0 }
        closing_balance: { type: number, default: 0 }
        is_bill_wise: { type: boolean }
        maintain_inventory_values: { type: boolean }
        mailing_name: { type: [string, "null"] }
        address1: { type: [string, "null"] }
        address2: { type: [string, "null"] }
        city: { type: [string, "null"] }
        state: { type: [string, "null"] }
        country: { type: [string, "null"] }
        pincode: { type: [string, "null"] }
        phone: { type: [string, "null"] }
        email: { type: [string, "null"] }
        gstin: { type: [string, "null"] }
        pan: { type: [string, "null"] }
        registration_type: { type: string, default: "Unregistered" }
        default_credit_period: { type: integer, default: 0 }
        check_credit_days: { type: boolean, description: "Coerced to 0/1 on insert." }
        allow_cost_centres: { type: boolean }
        invoice_rounding: { type: boolean }
        rounding_method: { type: [string, "null"] }
        rounding_limit: { type: number, default: 0 }
        additional_gst_details: { type: boolean }
        service_tax_details: { type: boolean }
        include_assessable_value: { type: string, default: "Not Applicable" }
        method_of_calculation: { type: string, default: "Based on Value" }
        other_statutory_details: { type: boolean }
        bank_details:
          oneOf:
            - $ref: '#/components/schemas/LedgerBankDetailsInput'
            - type: "null"
        statutory_details:
          oneOf:
            - $ref: '#/components/schemas/LedgerStatutoryDetailsInput'
            - type: "null"
      required: [company_id, name]

    LedgerUpdateInput:
      allOf:
        - $ref: '#/components/schemas/LedgerCreateInput'
        - type: object
          properties:
            ledger_id:
              type: integer
              description: Required to identify the target row.
          required: [ledger_id]

    LedgerBankDetailsInput:
      type: object
      properties:
        account_holder_name: { type: [string, "null"] }
        account_number: { type: [string, "null"] }
        ifsc_code: { type: [string, "null"] }
        swift_code: { type: [string, "null"] }
        bank_name: { type: [string, "null"] }
        branch_name: { type: [string, "null"] }
        bank_configuration: { type: [string, "null"] }
        cheque_book_start_no: { type: [string, "null"] }
        cheque_book_end_no: { type: [string, "null"] }
        enable_cheque_printing: { type: boolean }
        cheque_printing_configuration: { type: [string, "null"] }
        od_limit: { type: number, default: 0 }
        transaction_type: { type: [string, "null"] }
        cross_using: { type: [string, "null"] }
        company_bank: { type: [string, "null"] }

    LedgerStatutoryDetailsInput:
      type: object
      properties:
        gst_applicability: { type: string, default: "Not Applicable" }
        hsn_sac_code: { type: [string, "null"] }
        hsn_sac_description: { type: [string, "null"] }
        gst_rate: { type: number, default: 0 }
        cgst_rate: { type: number, default: 0 }
        sgst_rate: { type: number, default: 0 }
        igst_rate: { type: number, default: 0 }
        type_of_duty_tax: { type: [string, "null"] }
        percentage_of_calculation: { type: number, default: 0 }
        statutory_details: { type: [string, "null"] }
        include_in_assessable_value_calculation: { type: string, default: "Not Applicable" }
        appropriate_to: { type: string, default: "Goods" }
        method_of_calculation: { type: string, default: "Based on Quantity" }
