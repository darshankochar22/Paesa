openapi: 3.1.0
info:
  title: tcsNatureOfGoods Module API
  version: 1.0.0
  description: >-
    IPC contract for the tcsNatureOfGoods backend module of the Electron + SQLite
    accounting/ERP app. Each operation maps to an ipcMain.handle channel exposed to
    the renderer via window.api.tcsNatureOfGoods.*. HTTP method/path are a modeling
    convention only; transport is Electron IPC (ipcRenderer.invoke).
tags:
  - name: tcsNatureOfGoods
    description: TCS (Tax Collected at Source) Nature of Goods master records.
paths:
  /tcsNatureOfGoods/create:
    post:
      operationId: tcsNatureOfGoods.create
      tags: [tcsNatureOfGoods]
      summary: Create a TCS Nature of Goods record (rejects duplicate active name within a company).
      x-ipc-channel: "tcsNatureOfGoods:create"
      x-window-api: "window.api.tcsNatureOfGoods.create"
      x-controller: "tcsNatureOfGoodsController.create"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TcsNatureOfGoodsCreateInput'
      responses:
        '200':
          description: Created record, or a failure flag if a duplicate active name exists.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/TcsNatureOfGoodsSingleResult'
                  - $ref: '#/components/schemas/FailureResult'
        '4XX':
          description: Client error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '5XX':
          description: Server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /tcsNatureOfGoods/getAll:
    post:
      operationId: tcsNatureOfGoods.getAll
      tags: [tcsNatureOfGoods]
      summary: List all active TCS Nature of Goods records for a company.
      x-ipc-channel: "tcsNatureOfGoods:getAll"
      x-window-api: "window.api.tcsNatureOfGoods.getAll"
      x-controller: "tcsNatureOfGoodsController.getAll"
      requestBody:
        required: true
        description: The handler receives a bare company_id value as its argument.
        content:
          application/json:
            schema:
              type: object
              properties:
                company_id:
                  type: integer
                  description: Company whose active records to list.
              required: [company_id]
      responses:
        '200':
          description: List of active records.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TcsNatureOfGoodsListResult'
        '4XX':
          description: Client error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '5XX':
          description: Server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /tcsNatureOfGoods/getById:
    post:
      operationId: tcsNatureOfGoods.getById
      tags: [tcsNatureOfGoods]
      summary: Fetch a single TCS Nature of Goods record by its tcs_id.
      x-ipc-channel: "tcsNatureOfGoods:getById"
      x-window-api: "window.api.tcsNatureOfGoods.getById"
      x-controller: "tcsNatureOfGoodsController.getById"
      requestBody:
        required: true
        description: The handler receives a bare id (tcs_id) value as its argument.
        content:
          application/json:
            schema:
              type: object
              properties:
                id:
                  type: integer
                  description: Primary key (tcs_id) of the record.
              required: [id]
      responses:
        '200':
          description: The record, or a failure flag if not found.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/TcsNatureOfGoodsSingleResult'
                  - $ref: '#/components/schemas/FailureResult'
        '4XX':
          description: Client error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '5XX':
          description: Server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /tcsNatureOfGoods/update:
    post:
      operationId: tcsNatureOfGoods.update
      tags: [tcsNatureOfGoods]
      summary: Update an existing TCS Nature of Goods record (partial; unset fields keep current values).
      x-ipc-channel: "tcsNatureOfGoods:update"
      x-window-api: "window.api.tcsNatureOfGoods.update"
      x-controller: "tcsNatureOfGoodsController.update"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TcsNatureOfGoodsUpdateInput'
      responses:
        '200':
          description: Updated record, or a failure flag if not found.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/TcsNatureOfGoodsSingleResult'
                  - $ref: '#/components/schemas/FailureResult'
        '4XX':
          description: Client error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '5XX':
          description: Server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /tcsNatureOfGoods/delete:
    post:
      operationId: tcsNatureOfGoods.delete
      tags: [tcsNatureOfGoods]
      summary: Soft-delete a record by setting is_active = 0.
      x-ipc-channel: "tcsNatureOfGoods:delete"
      x-window-api: "window.api.tcsNatureOfGoods.delete"
      x-controller: "tcsNatureOfGoodsController.delete"
      requestBody:
        required: true
        description: The handler receives a bare id (tcs_id) value as its argument.
        content:
          application/json:
            schema:
              type: object
              properties:
                id:
                  type: integer
                  description: Primary key (tcs_id) of the record to soft-delete.
              required: [id]
      responses:
        '200':
          description: Success flag, or a failure flag if not found.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/SuccessResult'
                  - $ref: '#/components/schemas/FailureResult'
        '4XX':
          description: Client error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '5XX':
          description: Server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
components:
  schemas:
    TcsNatureOfGoodsRow:
      type: object
      description: A row of the tcs_nature_of_goods table as returned by SELECT *.
      properties:
        tcs_id:
          type: integer
          description: Primary key (AUTOINCREMENT).
        company_id:
          type: integer
          description: Owning company (FK -> companies.company_id).
        name:
          type: string
        section:
          type: [string, "null"]
        payment_code:
          type: [string, "null"]
        rate_individual_with_pan:
          type: number
          description: TCS rate for individuals with PAN. Stored as SQLite REAL; treat as NUMERIC(18,4).
        rate_individual_without_pan:
          type: number
        rate_other_with_pan:
          type: number
        rate_other_without_pan:
          type: number
        is_own_status:
          type: integer
          description: 0/1 boolean flag.
        tax_on_receipt_or_realization:
          type: string
          description: Default "Tax Calculated on Receipt".
        threshold_level:
          type: number
          description: Threshold amount. Stored as SQLite REAL; treat as NUMERIC(18,2).
        is_zero_rated:
          type: integer
          description: 0/1 boolean flag.
        is_predefined:
          type: integer
          description: 0/1 boolean flag (always inserted as 0 by create).
        is_active:
          type: integer
          description: 0/1 boolean flag; 1 = active, 0 = soft-deleted.
        created_at:
          type: string
          description: ISO-8601 datetime string (SQLite datetime('now')).
        updated_at:
          type: string
          description: ISO-8601 datetime string (SQLite datetime('now')).
      required: [tcs_id, company_id, name]
    TcsNatureOfGoodsCreateInput:
      type: object
      description: >-
        Payload for create. Derived from service destructuring of data.* fields.
        is_predefined and is_active are forced to 0 and 1 by the SQL and are not
        accepted from the client.
      properties:
        company_id:
          type: integer
        name:
          type: string
        section:
          type: [string, "null"]
        payment_code:
          type: [string, "null"]
        rate_individual_with_pan:
          type: number
          default: 0
        rate_individual_without_pan:
          type: number
          default: 0
        rate_other_with_pan:
          type: number
          default: 0
        rate_other_without_pan:
          type: number
          default: 0
        is_own_status:
          type: integer
          default: 0
        tax_on_receipt_or_realization:
          type: string
          default: "Tax Calculated on Receipt"
        threshold_level:
          type: number
          default: 0
        is_zero_rated:
          type: integer
          default: 0
      required: [company_id, name]
    TcsNatureOfGoodsUpdateInput:
      type: object
      description: >-
        Payload for update. tcs_id identifies the row; any omitted field falls back
        to the existing stored value. company_id, is_predefined and is_active are
        not updatable via this operation.
      properties:
        tcs_id:
          type: integer
        name:
          type: string
        section:
          type: [string, "null"]
        payment_code:
          type: [string, "null"]
        rate_individual_with_pan:
          type: number
        rate_individual_without_pan:
          type: number
        rate_other_with_pan:
          type: number
        rate_other_without_pan:
          type: number
        is_own_status:
          type: integer
        tax_on_receipt_or_realization:
          type: string
        threshold_level:
          type: number
        is_zero_rated:
          type: integer
      required: [tcs_id]
    TcsNatureOfGoodsSingleResult:
      type: object
      properties:
        success:
          const: true
        tcsNatureOfGoods:
          $ref: '#/components/schemas/TcsNatureOfGoodsRow'
      required: [success, tcsNatureOfGoods]
    TcsNatureOfGoodsListResult:
      type: object
      properties:
        success:
          const: true
        tcsNatureOfGoodsList:
          type: array
          items:
            $ref: '#/components/schemas/TcsNatureOfGoodsRow'
      required: [success, tcsNatureOfGoodsList]
    SuccessResult:
      type: object
      properties:
        success:
          const: true
      required: [success]
    FailureResult:
      type: object
      description: Returned when an operation fails (duplicate, not found, or caught exception).
      properties:
        success:
          const: false
        error:
          type: string
      required: [success, error]
    Error:
      type: object
      description: Shared error envelope.
      properties:
        error:
          type: string
        message:
          type: string
      required: [error, message]
