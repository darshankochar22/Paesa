components:
  schemas:
    CompanyFyParams:
      type: object
      description: "Active company + financial year context."
      properties:
        company_id: { type: number }
        fy_id: { type: number }
      required: [company_id, fy_id]
    CompanyFyDateRangeParams:
      type: object
      description: "Active company + financial year context with an optional date range (YYYY-MM-DD)."
      properties:
        company_id: { type: number }
        fy_id: { type: number }
        from_date: { type: string }
        to_date: { type: string }
      required: [company_id, fy_id]
    OutstandingRow:
      type: object
      properties:
        ledger_id: { type: number }
        party: { type: string }
        bill: { type: string }
        bill_date: { type: [string, "null"] }
        due_date: { type: [string, "null"] }
        credit_period: { type: [number, "null"] }
        overdue_days: { type: number }
        balance: { type: number }
        ageing: { type: string, enum: ['0-30', '31-60', '61-90', '90+'] }
    OutstandingResult:
      type: object
      properties:
        success: { type: boolean }
        as_on: { type: string }
        rows:
          type: array
          items: { $ref: '#/components/schemas/OutstandingRow' }
        total: { type: number }
        bucketTotals:
          type: object
          additionalProperties: { type: number }
        error: { type: string }
    CashFlowLedger:
      type: object
      properties:
        ledger_id: { type: number }
        ledger_name: { type: string }
        inflow: { type: number }
        outflow: { type: number }
        net: { type: number }
    CashFlowVoucherType:
      type: object
      properties:
        voucher_type: { type: string }
        inflow: { type: number }
        outflow: { type: number }
        net: { type: number }
    CashFlowResult:
      type: object
      properties:
        success: { type: boolean }
        from_date: { type: [string, "null"] }
        to_date: { type: [string, "null"] }
        cashBankLedgers:
          type: array
          items:
            type: object
            properties:
              ledger_id: { type: number }
              ledger_name: { type: string }
              ledger_type: { type: string }
        byCounterLedger:
          type: array
          items: { $ref: '#/components/schemas/CashFlowLedger' }
        byVoucherType:
          type: array
          items: { $ref: '#/components/schemas/CashFlowVoucherType' }
        totalInflow: { type: number }
        totalOutflow: { type: number }
        netCashFlow: { type: number }
        error: { type: string }
    FundsFlowLine:
      type: object
      properties:
        particulars: { type: string }
        amount: { type: number }
    FundsFlowResult:
      type: object
      properties:
        success: { type: boolean }
        from_date: { type: [string, "null"] }
        to_date: { type: [string, "null"] }
        fundsFromOperations: { type: number }
        periodIncome: { type: number }
        periodExpenses: { type: number }
        sources:
          type: array
          items: { $ref: '#/components/schemas/FundsFlowLine' }
        applications:
          type: array
          items: { $ref: '#/components/schemas/FundsFlowLine' }
        totalSources: { type: number }
        totalApplications: { type: number }
        netWorkingCapitalChange: { type: number }
        isNetIncrease: { type: boolean }
        error: { type: string }
    StockSummaryItem:
      type: object
