openapi: 3.1.0
info:
  title: Report Extras Module API
  version: 2.0.0
  description: >
    Additional READ-ONLY financial & inventory reports layered on top of the core
    report module. Each channel is registered in server/index.js, exposed to the
    renderer via preload.js as window.api.report.<method>, and dispatched through
    server/report/reportController.js to a dedicated report service.

    Services include: outstandingReportService (bills receivable/payable with
    ageing), cashFlowReportService (cash flow statement),
    fundsFlowReportService (funds flow statement), stockSummaryReportService
    (stock summary with FIFO/Avg valuation), ratioAnalysisReportService
    (financial ratios), advancedInventoryReportService (godown summary, stock
    ageing, movement analysis, reorder status, order outstanding),
    advancedAccountingReportService (cost centre, budget vs actual),
    payrollReportService (payslips, salary, PF, ESI, PT, gratuity, attendance).

    These reports never write: they derive every figure live from posted (non-
    cancelled) voucher entries / bill references / stock movements for the active
    company + financial year. All 586 reports are also accessible via the dynamic
    report engine (report:run).
tags:
  - name: reportExtras
    description: Outstanding, cash flow, funds flow, stock summary, ratio analysis, advanced inventory, advanced accounting, and payroll reports.
paths:
  /report/billsReceivable:
    post:
      operationId: report.billsReceivable
      tags: [reportExtras]
      summary: Bills Receivable (Sundry Debtors) outstanding with 0-30 / 31-60 / 61-90 / 90+ ageing buckets.
      x-ipc-channel: "report:billsReceivable"
      x-window-api: "window.api.report.billsReceivable"
      x-controller: "reportController.billsReceivable"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CompanyFyParams' }
      responses:
        '200':
          description: Outstanding receivable bills with ageing.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OutstandingResult' }
  /report/billsPayable:
    post:
      operationId: report.billsPayable
      tags: [reportExtras]
      summary: Bills Payable (Sundry Creditors) outstanding with 0-30 / 31-60 / 61-90 / 90+ ageing buckets.
