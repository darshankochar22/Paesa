        '200':
          description: Outstanding payable bills with ageing.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OutstandingResult' }
  /report/cashFlow:
    post:
      operationId: report.cashFlow
      tags: [reportExtras]
      summary: Cash Flow statement — inflow/outflow through Cash & Bank ledgers, by counter-ledger and voucher type.
      x-ipc-channel: "report:cashFlow"
      x-window-api: "window.api.report.cashFlow"
      x-controller: "reportController.cashFlow"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CompanyFyDateRangeParams' }
      responses:
        '200':
          description: Cash flow inflows/outflows for the period.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CashFlowResult' }
  /report/fundsFlow:
    post:
      operationId: report.fundsFlow
      tags: [reportExtras]
      summary: Funds Flow statement — sources & applications of funds and working-capital reconciliation.
      x-ipc-channel: "report:fundsFlow"
      x-window-api: "window.api.report.fundsFlow"
      x-controller: "reportController.fundsFlow"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CompanyFyDateRangeParams' }
      responses:
        '200':
          description: Funds flow sources/applications for the period.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/FundsFlowResult' }
  /report/stockSummary:
    post:
      operationId: report.stockSummary
      tags: [reportExtras]
      summary: Stock Summary — closing quantity & value per item (with group rollup) from opening + movements.
      x-ipc-channel: "report:stockSummary"
      x-window-api: "window.api.report.stockSummary"
      x-controller: "reportController.stockSummary"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/CompanyFyParams'
                - type: object
                  properties:
                    as_on_date: { type: string, description: "Optional movement ceiling (YYYY-MM-DD)." }
      responses:
        '200':
          description: Per-item and per-group closing stock.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/StockSummaryResult' }
  /report/ratioAnalysis:
    post:
      operationId: report.ratioAnalysis
      tags: [reportExtras]
      summary: Ratio Analysis — current/quick/debt-equity ratios, profitability %, working capital and turnover.
      x-ipc-channel: "report:ratioAnalysis"
