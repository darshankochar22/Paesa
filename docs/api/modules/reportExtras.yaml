            schema: { $ref: '#/components/schemas/CompanyFyParams' }
      responses:
        '200':
          description: Computed financial ratios plus the components they were derived from.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RatioAnalysisResult' }

  # ── Advanced Inventory Reports ──────────────────────────────────────────────
