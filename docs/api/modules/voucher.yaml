    VoucherUpdateInput:
      type: object
      description: >
        Payload for voucher:update. Requires voucher_id. The header fields date,
        reference_number, reference_date, narration, party_ledger_id, party_name,
        place_of_supply are updatable; other fields fall back to current values.
        When `entries` is present it fully replaces existing entries (and must
        balance). bill_references/receipt_details/party_details/dispatch_details/
        payroll_entries are replaced only when the key is present (=== undefined check).
      properties:
        voucher_id: { type: integer }
        company_id: { type: [integer, "null"] }
        voucher_type: { type: [string, "null"] }
        date: { type: [string, "null"], format: date }
        reference_number: { type: [string, "null"] }
        reference_date: { type: [string, "null"], format: date }
        narration: { type: [string, "null"] }
        party_ledger_id: { type: [integer, "null"] }
        party_name: { type: [string, "null"] }
        place_of_supply: { type: [string, "null"] }
        entries:
          type: array
          items: { $ref: '#/components/schemas/VoucherEntry' }
        bill_references:
          type: array
          items: { $ref: '#/components/schemas/VoucherBillReference' }
        receipt_details: { $ref: '#/components/schemas/VoucherReceiptDetailInput' }
        party_details: { $ref: '#/components/schemas/VoucherPartyDetailInput' }
        dispatch_details: { $ref: '#/components/schemas/VoucherDispatchDetailInput' }
        payroll_entries:
          type: array
          items:
            type: object
            properties:
              employee_id: { type: [integer, "null"] }
              pay_head_id: { type: [integer, "null"] }
              amount: { type: number }
      required: [voucher_id]
