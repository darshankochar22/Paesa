        voucher_id: { type: integer }
        employee_id: { type: [integer, "null"] }
        pay_head_id: { type: [integer, "null"] }
        amount: { type: number, description: Currency amount. }
        employee_name: { type: [string, "null"], description: Joined from employees (getById only). }
        employee_number: { type: [string, "null"], description: Joined employee_code (getById only). }
        pay_head_name: { type: [string, "null"], description: Joined from pay_heads (getById only). }
      required: [payroll_entry_id, voucher_id]

    VoucherDetail:
      description: Fully hydrated voucher returned by getById.
      allOf:
        - $ref: '#/components/schemas/Voucher'
        - type: object
          properties:
            entries:
              type: array
              items: { $ref: '#/components/schemas/VoucherEntry' }
            stock_entries:
              type: array
              items: { $ref: '#/components/schemas/VoucherStockEntry' }
            bill_references:
              type: array
              items: { $ref: '#/components/schemas/VoucherBillReference' }
            bank_details:
              oneOf:
                - $ref: '#/components/schemas/VoucherBankDetail'
                - type: "null"
            cost_centres:
              type: array
              items: { $ref: '#/components/schemas/VoucherCostCentre' }
            cash_denominations:
              type: array
              items: { $ref: '#/components/schemas/VoucherCashDenomination' }
            receipt_details:
              oneOf:
                - $ref: '#/components/schemas/VoucherReceiptDetail'
                - type: "null"
            party_details:
              oneOf:
                - $ref: '#/components/schemas/VoucherPartyDetail'
                - type: "null"
            dispatch_details:
              oneOf:
                - $ref: '#/components/schemas/VoucherDispatchDetail'
                - type: "null"
            credit_note_details:
              oneOf:
                - $ref: '#/components/schemas/VoucherCreditNoteDetail'
                - type: "null"
            debit_note_details:
              oneOf:
                - $ref: '#/components/schemas/VoucherDebitNoteDetail'
                - type: "null"
            payroll_entries:
              type: array
              items: { $ref: '#/components/schemas/VoucherPayrollEntry' }

    VoucherCreateInput:
      type: object
      description: >
        Payload for voucher:create. The controller forwards the whole object to
        voucherService.create(data). Most fields mirror the `vouchers` columns;
        nested arrays/objects populate the sub-tables. For Sales/Purchase/Credit
        Note/Debit Note accounting vouchers, the GST tax engine recomputes
        `entries`/`stock_entries` server-side. Dr/Cr entries must net to zero.
      properties:
        company_id: { type: integer }
        fy_id: { type: integer }
        voucher_type: { type: string }
        voucher_number: { type: [string, "null"], description: Auto-generated when omitted. }
        date: { type: string, format: date }
        status: { type: [string, "null"], default: Regular }
        supplier_invoice_no: { type: [string, "null"] }
        supplier_invoice_date: { type: [string, "null"], format: date }
        reference_number: { type: [string, "null"] }
        reference_date: { type: [string, "null"], format: date }
        narration: { type: [string, "null"] }
        party_ledger_id: { type: [integer, "null"] }
        party_name: { type: [string, "null"] }
        place_of_supply: { type: [string, "null"] }
        is_invoice: { type: [boolean, integer, "null"] }
        is_accounting_voucher: { type: [boolean, integer, "null"], default: true }
        is_inventory_voucher: { type: [boolean, integer, "null"] }
        is_order_voucher: { type: [boolean, integer, "null"] }
        is_optional: { type: [boolean, integer, "null"] }
        is_post_dated: { type: [boolean, integer, "null"] }
        entries:
          type: array
          items:
            type: object
            properties:
              ledger_id: { type: [integer, "null"] }
              ledger_name: { type: [string, "null"] }
              type: { type: string, enum: [Dr, Cr] }
              amount: { type: number }
              amount_forex: { type: [number, "null"] }
              currency: { type: [string, "null"], default: INR }
              narration: { type: [string, "null"] }
              cost_centres:
                type: array
                items:
                  type: object
                  properties:
                    cost_centre_id: { type: integer }
                    amount: { type: number }
            required: [type, amount]
        stock_entries:
          type: array
          items:
            type: object
            properties:
              stock_item_id: { type: [integer, "null"] }
              item_name: { type: [string, "null"] }
              godown_id: { type: [integer, "null"] }
              unit_id: { type: [integer, "null"] }
              quantity: { type: number }
              rate: { type: number }
              additional_amount: { type: [number, "null"] }
              discount_amount: { type: [number, "null"] }
              hsn_code: { type: [string, "null"] }
              gst_rate: { type: [number, "null"] }
              cgst_amount: { type: [number, "null"] }
              sgst_amount: { type: [number, "null"] }
              igst_amount: { type: [number, "null"] }
              is_source: { type: [boolean, integer, "null"] }
              batch:
                type: object
                properties:
                  batch_number: { type: string }
                  expiry_date: { type: [string, "null"], format: date }
                  quantity: { type: [number, "null"] }
                  rate: { type: [number, "null"] }
            required: [quantity, rate]
        payroll_entries:
          type: array
          items:
            type: object
            properties:
              employee_id: { type: [integer, "null"] }
              pay_head_id: { type: [integer, "null"] }
              amount: { type: number }
        bill_references:
          type: array
          items:
            type: object
            properties:
              ledger_id: { type: [integer, "null"] }
              bill_name: { type: [string, "null"] }
              bill_type: { type: [string, "null"] }
              amount: { type: number }
              credit_period: { type: [string, "null"] }
              due_date: { type: [string, "null"], format: date }
        bank_details:
          type: object
          properties:
            ledger_id: { type: [integer, "null"] }
            transaction_type: { type: [string, "null"], default: Cheque }
            cheque_range: { type: [string, "null"] }
            instrument_number: { type: [string, "null"] }
            instrument_date: { type: [string, "null"], format: date }
            bank_name: { type: [string, "null"] }
            branch: { type: [string, "null"] }
            amount: { type: [number, "null"] }
        cash_denominations:
          type: object
          properties:
            ledger_id: { type: [integer, "null"] }
            entries:
              type: array
              items:
                type: object
                properties:
                  ledger_id: { type: [integer, "null"] }
                  denomination: {}
                  quantity: { type: [integer, "null"] }
                  amount: { type: [number, "null"] }
            others: { type: [number, "null"] }
        receipt_details: { $ref: '#/components/schemas/VoucherReceiptDetailInput' }
        party_details: { $ref: '#/components/schemas/VoucherPartyDetailInput' }
        dispatch_details: { $ref: '#/components/schemas/VoucherDispatchDetailInput' }
        credit_note_details: { $ref: '#/components/schemas/VoucherCreditNoteDetailInput' }
        debit_note_details: { $ref: '#/components/schemas/VoucherDebitNoteDetailInput' }
      required: [company_id, fy_id, voucher_type, date]

