name: Build All Platforms

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Fast test job — runs on every push/PR before builds ────────────────────
  test:
    name: Tests (Backend + Frontend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - name: Install root deps
        run: npm install --ignore-scripts

      - name: Lint backend (ESLint)
        run: npm run lint

      - name: Run Backend Integration Tests
        run: npm run test

      - name: Install client deps
        run: cd client && npm install

      - name: Typecheck frontend (tsc)
        run: cd client && npx tsc -b

      - name: Lint frontend (ESLint — report-only)
        run: cd client && npm run lint
        continue-on-error: true

      - name: Run Frontend Unit Tests (Vitest)
        run: cd client && npm run test

  # ── Windows ──────────────────────────────────────────────────────────────
  build-windows:
    needs: test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - name: Install root deps
        run: npm install

      - name: Install client deps
        run: cd client && npm install

      - name: Build client
        run: cd client && npm run build

      - name: Build Windows
        run: npx electron-builder --win --x64 --publish never

      - name: Upload Windows
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            dist/*.exe
            !dist/*__uninstaller.exe

  # ── macOS ─────────────────────────────────────────────────────────────────
  build-mac:
    needs: test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - name: Install root deps
        run: npm install

      - name: Install client deps
        run: cd client && npm install

      - name: Build client
        run: cd client && npm run build

      - name: Build macOS
        run: npx electron-builder --mac --publish never

      - name: Upload macOS
        uses: actions/upload-artifact@v4
        with:
          name: mac-build
          path: dist/*.dmg

  # ── Linux ─────────────────────────────────────────────────────────────────
  build-linux:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libarchive-tools

      - name: Install root deps
        run: npm install

      - name: Install client deps
        run: cd client && npm install

      - name: Build client
        run: cd client && npm run build

      - name: Build Linux
        run: npx electron-builder --linux --publish never

      - name: Upload Linux
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: |
            dist/*.AppImage
            dist/*.deb
            dist/*.rpm
